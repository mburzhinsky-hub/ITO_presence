<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Планирование ресурсов инженерной команды</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
:root{
  --bg:#f4f7fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --surface-3:#eef3f9;
  --text:#102033;
  --muted:#607089;
  --border:#dbe4ef;
  --border-strong:#c4d2e3;
  --shadow:0 16px 40px rgba(15,23,42,.08);
  --primary:#2563eb;
  --primary-2:#1d4ed8;
  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#dc2626;
  --danger-2:#b91c1c;
  --violet:#7c3aed;
  --slate:#475569;
  --sidebar:#0f172a;
  --sidebar-muted:#94a3b8;
  --sidebar-active:#1e293b;
  --radius-lg:18px;
  --radius-md:14px;
  --radius-sm:10px;
  --green-bg:rgba(22,163,74,.14);
  --yellow-bg:rgba(245,158,11,.16);
  --red-bg:rgba(220,38,38,.14);
  --violet-bg:rgba(124,58,237,.12);
  --blue-bg:rgba(37,99,235,.12);
  --gray-bg:rgba(96,112,137,.14);
  --cell-green:#c8f0d6;
  --cell-lime:#dff6cf;
  --cell-yellow:#fff0b3;
  --cell-orange:#ffd6a5;
  --cell-red:#ffb4b4;
  --cell-gray:#e5e7eb;
  --cell-blue:#dce9ff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
.app-shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.sidebar{background:var(--sidebar);color:#fff;padding:28px 22px 20px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;flex-direction:column;gap:8px}
.brand__title{font-size:24px;font-weight:800;line-height:1.1}
.brand__subtitle{font-size:14px;color:var(--sidebar-muted);line-height:1.5}
.nav-list{display:flex;flex-direction:column;gap:8px}
.nav-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;border-radius:16px;border:1px solid transparent;background:transparent;color:#e2e8f0;font-weight:600;text-align:left;transition:.18s ease}
.nav-btn:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.06)}
.nav-btn.is-active{background:var(--sidebar-active);border-color:rgba(255,255,255,.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
.nav-btn__dot{width:12px;height:12px;border-radius:999px;background:#334155;flex:none}
.nav-btn.is-active .nav-btn__dot{background:#60a5fa}
.sidebar-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:6px}
.sidebar .btn{width:100%;justify-content:center}
.sidebar-note{margin-top:auto;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;font-size:13px;line-height:1.55}
.workspace{display:flex;flex-direction:column;min-width:0}
.topbar{padding:24px 28px 0;display:flex;justify-content:space-between;gap:20px;align-items:flex-start}
.topbar__left{display:flex;flex-direction:column;gap:8px;min-width:0}
.breadcrumbs{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px}
.breadcrumbs button{border:none;background:none;padding:0;color:var(--muted);font-weight:600}
.breadcrumbs .sep{opacity:.55}
.page-title{font-size:32px;font-weight:800;line-height:1.1;letter-spacing:-0.02em}
.page-subtitle{color:var(--muted);font-size:15px;line-height:1.5;max-width:920px}
.topbar__right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.save-state{padding:10px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;box-shadow:var(--shadow)}
.content{padding:24px 28px 32px}
.view-stack{display:flex;flex-direction:column;gap:20px}
.card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.card{padding:20px}
.panel{padding:18px}
.hero-card{display:flex;flex-direction:column;gap:18px;padding:22px 24px}
.hero-top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;flex-wrap:wrap}
.hero-title{display:flex;flex-direction:column;gap:6px}
.overline{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.hero-heading{font-size:28px;font-weight:800;line-height:1.1;margin:0}
.hero-meta{display:flex;flex-wrap:wrap;gap:8px}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
.toolbar__group{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.filters-row{display:flex;flex-wrap:wrap;gap:12px}
.field{display:flex;flex-direction:column;gap:6px;min-width:180px}
.field--grow{flex:1 1 280px}
.field label,.field__label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.input,.select,.textarea,.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border-strong);background:#fff;color:var(--text);
  outline:none;transition:.18s ease;min-height:46px
}
.textarea, .field textarea{min-height:92px;resize:vertical}
.input:focus,.select:focus,.textarea:focus,.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(37,99,235,.6);box-shadow:0 0 0 4px rgba(37,99,235,.08)}
.checkbox-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.checkbox{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--text)}
.checkbox input{width:18px;height:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:11px 14px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-weight:700;transition:.18s ease}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-2)}
.btn-danger{background:#fff5f5;color:var(--danger);border-color:#fecaca}
.btn-ghost{background:transparent}
.btn-small{padding:8px 10px;font-size:13px;border-radius:10px}
.btn-icon{width:42px;height:42px;padding:0}
.btn-group{display:flex;flex-wrap:wrap;gap:8px}
.badges,.chip-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge,.chip{
  display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;
  border:1px solid transparent;line-height:1
}
.badge--neutral,.chip--neutral{background:var(--gray-bg);color:var(--slate);border-color:rgba(71,85,105,.12)}
.badge--blue,.chip--blue{background:var(--blue-bg);color:var(--primary-2);border-color:rgba(37,99,235,.16)}
.badge--green,.chip--green{background:var(--green-bg);color:#166534;border-color:rgba(22,163,74,.14)}
.badge--yellow,.chip--yellow{background:var(--yellow-bg);color:#92400e;border-color:rgba(245,158,11,.16)}
.badge--red,.chip--red{background:var(--red-bg);color:var(--danger-2);border-color:rgba(220,38,38,.14)}
.badge--violet,.chip--violet{background:var(--violet-bg);color:#5b21b6;border-color:rgba(124,58,237,.14)}
.badge--outline,.chip--outline{background:#fff;border-color:var(--border);color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px}
.kpi-card{padding:18px;border-radius:16px;border:1px solid var(--border);background:linear-gradient(180deg,#fff,#f9fbff);display:flex;flex-direction:column;gap:8px}
.kpi-card__title{font-size:13px;font-weight:700;color:var(--muted)}
.kpi-card__value{font-size:30px;font-weight:800;letter-spacing:-.03em}
.kpi-card__hint{font-size:13px;color:var(--muted);line-height:1.5}
.kpi-card--red{background:linear-gradient(180deg,#fff,#fff7f7)}
.kpi-card--green{background:linear-gradient(180deg,#fff,#f5fff8)}
.kpi-card--blue{background:linear-gradient(180deg,#fff,#f7fbff)}
.kpi-card--yellow{background:linear-gradient(180deg,#fff,#fffaf0)}
.cards-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.cards-grid.cards-grid--2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cards-grid.cards-grid--4{grid-template-columns:repeat(4,minmax(0,1fr))}
.project-card,.employee-card,.template-card{display:flex;flex-direction:column;gap:14px;padding:20px;border-radius:18px;border:1px solid var(--border);background:#fff;box-shadow:var(--shadow)}
.project-card__header,.employee-card__header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.project-card__title,.employee-card__title{font-size:20px;font-weight:800;line-height:1.2}
.project-card__subtitle,.employee-card__subtitle{font-size:14px;color:var(--muted)}
.metrics-inline{display:flex;flex-wrap:wrap;gap:10px 16px}
.metric-inline{display:flex;flex-direction:column;gap:4px}
.metric-inline__label{font-size:12px;color:var(--muted);font-weight:700}
.metric-inline__value{font-size:17px;font-weight:800}
.avatar{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#dbeafe,#eff6ff);display:grid;place-items:center;font-weight:800;color:#1d4ed8;flex:none}
.split{display:grid;grid-template-columns:minmax(0,2.2fr) minmax(0,1fr);gap:20px}
.split-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:20px}
.list{display:flex;flex-direction:column;gap:10px}
.list-item{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:var(--surface-2)}
.list-item__title{font-weight:700;line-height:1.35}
.list-item__meta{font-size:13px;color:var(--muted);line-height:1.45}
.list-item__aside{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
.callout{padding:16px 18px;border-radius:16px;border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;line-height:1.6}
.callout--blue{background:#f7fbff;border-color:#dbeafe}
.callout--yellow{background:#fffbeb;border-color:#fde68a}
.callout--violet{background:#faf5ff;border-color:#e9d5ff}
.callout__title{font-size:15px;font-weight:800}
.callout ul{margin:0;padding-left:18px}
.section-title{font-size:20px;font-weight:800;margin:0}
.section-subtitle{margin:0;color:var(--muted);font-size:14px;line-height:1.6}
.table-wrap{border:1px solid var(--border);border-radius:16px;overflow:auto;background:#fff}
.table{width:100%;border-collapse:separate;border-spacing:0;min-width:960px}
.table th,.table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top;text-align:left;background:#fff}
.table th{position:sticky;top:0;z-index:2;background:#f8fafc;font-size:12px;letter-spacing:.02em;text-transform:none;color:var(--muted);font-weight:800}
.table tr:hover td{background:#fcfdff}
.table td .muted,.muted{color:var(--muted)}
.table td .strong{font-weight:700}
.table .actions{display:flex;flex-wrap:wrap;gap:8px}
.table .nowrap{white-space:nowrap}
.table .sticky-col{position:sticky;left:0;z-index:1;background:inherit;box-shadow:1px 0 0 var(--border)}
.table thead .sticky-col{z-index:3;background:#f8fafc}
.risk-reasons{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);line-height:1.45}
.empty-state{padding:28px;border:1px dashed var(--border-strong);border-radius:16px;background:#fff;text-align:center;color:var(--muted);line-height:1.6}
.tabs{display:flex;flex-wrap:wrap;gap:8px;padding:6px;background:#f0f4fa;border-radius:16px;border:1px solid var(--border)}
.tab-btn{border:none;background:transparent;padding:12px 16px;border-radius:12px;font-weight:800;color:var(--muted)}
.tab-btn.is-active{background:#fff;color:var(--text);box-shadow:0 8px 18px rgba(15,23,42,.08)}
.legend{display:flex;flex-wrap:wrap;gap:8px}
.legend-item{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.legend-item__swatch{width:14px;height:14px;border-radius:4px;border:1px solid rgba(15,23,42,.08)}
.chart-card{padding:18px;display:flex;flex-direction:column;gap:16px}
.chart-card canvas{width:100%!important;min-height:280px;max-height:360px}
.chart-card--wide canvas{min-height:320px}
.heatmap-wrap{border:1px solid var(--border);border-radius:16px;overflow:auto;background:#fff}
.heatmap-table{border-collapse:separate;border-spacing:0;min-width:max-content;width:max-content}
.heatmap-table th,.heatmap-table td{padding:8px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;white-space:nowrap}
.heatmap-table th{position:sticky;top:0;background:#f8fafc;color:var(--muted);font-size:12px;font-weight:800;z-index:2}
.heatmap-table .sticky-col{position:sticky;left:0;background:#fff;z-index:1;text-align:left;min-width:220px;box-shadow:1px 0 0 var(--border)}
.heatmap-table thead .sticky-col{background:#f8fafc;z-index:3}
.heatmap-cell{font-weight:700;min-width:60px}
.heatmap-cell--dim{color:var(--muted);font-weight:600}
.mini-note{font-size:12px;color:var(--muted);line-height:1.5}
.loadbar{width:160px;height:8px;border-radius:999px;background:#edf2f7;overflow:hidden}
.loadbar__fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#60a5fa,#2563eb)}
.loadbar__fill--warn{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.loadbar__fill--danger{background:linear-gradient(90deg,#fb7185,#dc2626)}
.presence-tools{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.brushes{display:flex;flex-wrap:wrap;gap:8px}
.brush-btn{border:1px solid var(--border);background:#fff;padding:10px 12px;border-radius:12px;font-size:13px;font-weight:700}
.brush-btn.is-active{border-color:rgba(37,99,235,.45);box-shadow:0 0 0 4px rgba(37,99,235,.08)}
.presence-table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0}
.presence-table th,.presence-table td{padding:8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;background:#fff}
.presence-table th{position:sticky;top:0;background:#f8fafc;z-index:2;font-size:12px;color:var(--muted);font-weight:800}
.presence-table .sticky-col{position:sticky;left:0;z-index:1;background:#fff;min-width:200px;text-align:left;box-shadow:1px 0 0 var(--border)}
.presence-table .sticky-col-2{position:sticky;left:200px;z-index:1;background:#fff;min-width:150px;text-align:left;box-shadow:1px 0 0 var(--border)}
.presence-table thead .sticky-col,.presence-table thead .sticky-col-2{background:#f8fafc;z-index:3}
.presence-cell{min-width:42px;height:42px;padding:0;border:none;border-radius:10px;font-size:12px;font-weight:800;display:grid;place-items:center;cursor:pointer;transition:.12s ease}
.presence-cell:hover{transform:translateY(-1px)}
.presence-head--weekend{background:#eef2f7}
.presence-cell--weekend{background:#f1f5f9}
.presence-cell--О{background:#dbeafe;color:#1d4ed8}
.presence-cell--У{background:#cffafe;color:#0f766e}
.presence-cell--ОТ{background:#ffedd5;color:#c2410c}
.presence-cell--Б{background:#fee2e2;color:#b91c1c}
.presence-cell--БУ{background:#ede9fe;color:#6d28d9}
.presence-cell--В{background:#e5e7eb;color:#475569}
.presence-cell--Н{background:#dbeafe;color:#1d4ed8}
.presence-cell--РВ{background:#ccfbf1;color:#0f766e}
.presence-cell--К{background:#fce7f3;color:#be185d}
.presence-cell--НФ{background:#fff7cc;color:#8a6c00;border:1px dashed #facc15}
.summary-row th,.summary-row td{background:#f8fafc;font-weight:700;color:var(--text)}
.gantt-shell{border:1px solid var(--border);border-radius:16px;overflow:auto;background:#fff}
.gantt-head,.gantt-row{display:grid;grid-template-columns:300px auto}
.gantt-label{position:sticky;left:0;z-index:2;background:#fff;border-right:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.gantt-head .gantt-label{z-index:4;background:#f8fafc}
.gantt-timeline{position:relative;min-height:74px;background:
 linear-gradient(to right, rgba(15,23,42,.04) 1px, transparent 1px);
 background-size:112px 100%;
}
.gantt-head .gantt-timeline{min-height:86px;background:#f8fafc;overflow:hidden}
.gantt-week-label{position:absolute;top:50px;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap}
.gantt-month-band{position:absolute;top:12px;height:24px;border-radius:999px;background:#e8eef8;padding:4px 10px;font-size:12px;font-weight:700;color:#274060;display:flex;align-items:center}
.gantt-bar{position:absolute;top:14px;height:46px;border-radius:14px;padding:8px 10px;display:flex;flex-direction:column;gap:4px;overflow:hidden;box-shadow:0 10px 20px rgba(15,23,42,.08);border:1px solid rgba(255,255,255,.5)}
.gantt-bar__title{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-bar__sub{display:flex;flex-wrap:wrap;gap:4px}
.gantt-row{border-top:1px solid var(--border)}
.gantt-row .gantt-label{z-index:1}
.gantt-row--employee .gantt-timeline{min-height:92px}
.gantt-bar--normal{background:linear-gradient(180deg,#e0f2fe,#bfdbfe);color:#1d4ed8}
.gantt-bar--attention{background:linear-gradient(180deg,#fff7cc,#fde68a);color:#92400e}
.gantt-bar--risk{background:linear-gradient(180deg,#ffe4e6,#fecdd3);color:#b91c1c}
.gantt-bar--overdue{background:linear-gradient(180deg,#f3e8ff,#ddd6fe);color:#6d28d9;border-style:dashed}
.gantt-flag{position:absolute;bottom:10px;right:10px;font-size:11px;font-weight:800;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.7)}
.project-stage-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.project-stage-mini{border:1px solid var(--border);border-radius:16px;padding:14px;background:#fff;display:flex;flex-direction:column;gap:10px}
.project-stage-mini__title{font-weight:800;line-height:1.35}
.modal-root{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none}
.modal-root.is-open{pointer-events:auto}
.modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.42);backdrop-filter:blur(4px)}
.modal{position:relative;z-index:1;background:#fff;border-radius:22px;box-shadow:0 30px 90px rgba(15,23,42,.22);width:min(980px,calc(100vw - 40px));max-height:calc(100vh - 36px);overflow:auto;border:1px solid rgba(255,255,255,.8)}
.modal.modal--wide{width:min(1200px,calc(100vw - 40px))}
.modal__header{position:sticky;top:0;background:#fff;padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:16px;align-items:flex-start;z-index:2}
.modal__title{font-size:24px;font-weight:800;line-height:1.15}
.modal__subtitle{font-size:14px;color:var(--muted);line-height:1.5;margin-top:6px}
.modal__body{padding:22px;display:flex;flex-direction:column;gap:18px}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-grid.form-grid--3{grid-template-columns:repeat(3,minmax(0,1fr))}
.form-grid .field--full{grid-column:1/-1}
.checkbox-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.check-card{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer}
.check-card input{margin-top:3px}
.check-card__meta{display:flex;flex-direction:column;gap:4px}
.modal__footer{padding:18px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.toast-root{position:fixed;top:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:10px}
.toast{background:#fff;border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;min-width:300px;max-width:420px}
.toast--success{border-left-color:var(--success)}
.toast--danger{border-left-color:var(--danger)}
.small{font-size:12px}
.sep-line{height:1px;background:var(--border);margin:4px 0}
.right{text-align:right}
.center{text-align:center}
.flex{display:flex}
.flex-col{display:flex;flex-direction:column}

@media (max-width: 1500px){
  .kpi-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .cards-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .project-stage-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width: 1180px){
  .app-shell{grid-template-columns:260px 1fr}

  .cards-grid,.cards-grid.cards-grid--4{grid-template-columns:1fr}

}
@media (max-width: 940px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto}
  .topbar{padding-top:16px}
  .form-grid,.form-grid.form-grid--3,.checkbox-grid{grid-template-columns:1fr}
  .presence-table .sticky-col-2{left:180px}
}

const DOM = {};
document.addEventListener('DOMContentLoaded', bootstrap);

function bootstrap(){
  DOM.content = document.getElementById('content');
  DOM.pageTitle = document.getElementById('pageTitle');
  DOM.pageSubtitle = document.getElementById('pageSubtitle');
  DOM.breadcrumbs = document.getElementById('breadcrumbs');
  DOM.sidebarNote = document.getElementById('sidebarNote');
  DOM.saveState = document.getElementById('saveState');
  DOM.modalRoot = document.getElementById('modalRoot');
  DOM.toastRoot = document.getElementById('toastRoot');
  DOM.importInput = document.getElementById('importInput');

  if (!ui.projectId && appData.projects[0]) {
    ui.projectId = appData.projects[0].id;
  }

  parseHash();
  bindGlobalEvents();
  renderApp();
}

function bindGlobalEvents(){
  document.addEventListener('click', handleClick);
  document.addEventListener('input', handleInputOrChange);
  document.addEventListener('change', handleInputOrChange);
  document.addEventListener('submit', handleSubmit);
  window.addEventListener('hashchange', () => {
    parseHash();
    renderApp();
  });
  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && DOM.modalRoot.classList.contains('is-open')) {
      closeModal();
    }
  });
  DOM.importInput.addEventListener('change', async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    try {
      await importDataFile(file);
      DOM.importInput.value = '';
    } catch (error) {
      console.error(error);
      toast(`Не удалось импортировать данные: ${error.message}`, 'danger');
      DOM.importInput.value = '';
    }
  });
}

function deepClone(value){
  return JSON.parse(JSON.stringify(value));
}

function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, (char) => ESCAPE_MAP[char]);
}

function safeText(value, fallback='—'){
  const text = value === undefined || value === null || value === '' ? fallback : String(value);
  return esc(text);
}

function round(value, digits = 1){
  const factor = Math.pow(10, digits);
  return Math.round((Number(value) + Number.EPSILON) * factor) / factor;
}

function num(value, fallback = 0){
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : fallback;
}

function unique(values){
  return Array.from(new Set(values.filter((value) => value !== undefined && value !== null && value !== '')));
}

function groupBy(items, key){
  return items.reduce((acc, item) => {
    const bucket = typeof key === 'function' ? key(item) : item[key];
    if (!acc[bucket]) acc[bucket] = [];
    acc[bucket].push(item);
    return acc;
  }, {});
}

function parseDate(value){
  if (value instanceof Date) {
    return new Date(Date.UTC(value.getUTCFullYear ? value.getUTCFullYear() : value.getFullYear(), value.getUTCMonth ? value.getUTCMonth() : value.getMonth(), value.getUTCDate ? value.getUTCDate() : value.getDate()));
  }
  if (!value) return null;
  if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}/.test(value)) {
    const [year, month, day] = value.slice(0,10).split('-').map(Number);
    return new Date(Date.UTC(year, month - 1, day));
  }
  const native = new Date(value);
  if (Number.isNaN(native.getTime())) return null;
  return new Date(Date.UTC(native.getUTCFullYear(), native.getUTCMonth(), native.getUTCDate()));
}

function toISO(value){
  const date = parseDate(value);
  return date ? date.toISOString().slice(0, 10) : '';
}

function addDays(value, amount){
  const date = parseDate(value);
  if (!date) return null;
  date.setUTCDate(date.getUTCDate() + amount);
  return date;
}

function addDaysIso(value, amount){
  return toISO(addDays(value, amount));
}

function diffDays(start, end){
  const startDate = parseDate(start);
  const endDate = parseDate(end);
  if (!startDate || !endDate) return 0;
  const diff = endDate.getTime() - startDate.getTime();
  return Math.round(diff / 86400000);
}

function compareIso(a, b){
  return String(a).localeCompare(String(b));
}

function maxIso(...dates){
  return dates.filter(Boolean).sort(compareIso).at(-1) || '';
}

function minIso(...dates){
  return dates.filter(Boolean).sort(compareIso)[0] || '';
}

function isWeekend(value){
  const date = parseDate(value);
  if (!date) return false;
  const day = date.getUTCDay();
  return day === 0 || day === 6;
}

function isWeekday(value){
  return !isWeekend(value);
}

function getWeekStart(value){
  const date = parseDate(value);
  if (!date) return null;
  const day = date.getUTCDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setUTCDate(date.getUTCDate() + diff);
  return date;
}

function getWeekStartIso(value){
  return toISO(getWeekStart(value));
}

function getWeeksBetween(startIso, endIso){
  const weeks = [];
  let cursor = getWeekStart(startIso);
  const end = getWeekStart(endIso);
  if (!cursor || !end) return weeks;
  while (cursor.getTime() <= end.getTime()) {
    weeks.push(toISO(cursor));
    cursor = addDays(cursor, 7);
  }
  return weeks;
}

function countWorkdaysInRange(startIso, endIso){
  if (!startIso || !endIso || startIso > endIso) return 0;
  let count = 0;
  let cursor = parseDate(startIso);
  const end = parseDate(endIso);
  while (cursor.getTime() <= end.getTime()) {
    if (!isWeekend(cursor)) count += 1;
    cursor = addDays(cursor, 1);
  }
  return count;
}

function listDatesInRange(startIso, endIso){
  if (!startIso || !endIso || startIso > endIso) return [];
  const dates = [];
  let cursor = parseDate(startIso);
  const end = parseDate(endIso);
  while (cursor.getTime() <= end.getTime()) {
    dates.push(toISO(cursor));
    cursor = addDays(cursor, 1);
  }
  return dates;
}

function listWorkdayIsosInRange(startIso, endIso){
  return listDatesInRange(startIso, endIso).filter(isWeekday);
}

function getMonthStart(monthKey){
  return `${monthKey}-01`;
}

function getMonthEnd(monthKey){
  const [year, month] = monthKey.split('-').map(Number);
  const nextMonth = month === 12 ? new Date(Date.UTC(year + 1, 0, 1)) : new Date(Date.UTC(year, month, 1));
  nextMonth.setUTCDate(nextMonth.getUTCDate() - 1);
  return toISO(nextMonth);
}

function getMonthsBetween(startIso, endIso){
  const result = [];
  let cursor = parseDate(startIso);
  const end = parseDate(endIso);
  if (!cursor || !end) return result;
  cursor.setUTCDate(1);
  while (cursor.getTime() <= end.getTime()) {
    result.push(toISO(cursor).slice(0,7));
    cursor.setUTCMonth(cursor.getUTCMonth() + 1);
  }
  return result;
}

function formatDate(value){
  const date = parseDate(value);
  if (!date) return '—';
  return new Intl.DateTimeFormat('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', timeZone: 'UTC' }).format(date);
}

function formatDateShort(value){
  const date = parseDate(value);
  if (!date) return '—';
  return new Intl.DateTimeFormat('ru-RU', { day: '2-digit', month: '2-digit', timeZone: 'UTC' }).format(date);
}

function formatMonth(value){
  const date = parseDate(`${value}-01`);
  if (!date) return value;
  return new Intl.DateTimeFormat('ru-RU', { month: 'long', year: 'numeric', timeZone: 'UTC' }).format(date);
}

function formatPct(value){
  if (value === undefined || value === null || value === '') return '—';
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return '—';
  const precision = Math.abs(numeric - Math.round(numeric)) < 0.05 ? 0 : 1;
  return `${numeric.toFixed(precision).replace('.', ',')}%`;
}

function formatEq(value){
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return '—';
  return numeric.toFixed(1).replace('.', ',');
}

function firstLetters(name){
  return String(name || '')
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map((part) => part[0])
    .join('')
    .toUpperCase();
}

function priorityWeight(priority){
  return { 'Высокий': 3, 'Средний': 2, 'Низкий': 1 }[priority] || 0;
}

function riskWeight(risk){
  return { 'Просрочено': 4, 'Риск': 3, 'Внимание': 2, 'Норма': 1 }[risk] || 0;
}

function loadTone(value){
  if (value > 100) return 'red';
  if (value >= 80) return 'yellow';
  if (value > 0) return 'green';
  return 'neutral';
}

function loadBg(value){
  if (value > 100) return 'var(--cell-red)';
  if (value >= 80) return 'var(--cell-orange)';
  if (value >= 60) return 'var(--cell-yellow)';
  if (value > 0) return 'var(--cell-green)';
  return 'var(--cell-gray)';
}

function makeId(prefix, items){
  let max = 0;
  items.forEach((item) => {
    const digits = String(item.id || '').replace(/\D+/g, '');
    const number = Number(digits);
    if (Number.isFinite(number) && number > max) max = number;
  });
  return `${prefix}${String(max + 1).padStart(3, '0')}`;
}

function getReferenceDate(data){
  const today = toISO(new Date());
  if (today >= data.meta.presenceHorizonStart && today <= data.meta.presenceHorizonEnd) {
    return today;
  }
  return data.meta.snapshotDate || data.meta.unfixedRuleStart || data.meta.presenceHorizonStart;
}

function ensureArray(value){
  return Array.isArray(value) ? value : [];
}

function parseMultiValue(value){
  if (Array.isArray(value)) {
    return unique(value.map((item) => String(item || '').trim()).filter(Boolean));
  }
  return unique(String(value || '')
    .split(/[|,;]/)
    .map((item) => item.trim())
    .filter(Boolean));
}


function loadStoredData(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return deepClone(INITIAL_DATA);
    return JSON.parse(raw);
  } catch (error) {
    console.warn('Не удалось прочитать localStorage, загружаю встроенные данные.', error);
    return deepClone(INITIAL_DATA);
  }
}

function saveData(message = 'Данные сохранены'){
  appData = normalizeData(appData);
  appData.meta.version = APP_EXPORT_VERSION;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  lastSavedAt = new Date();
  updateSaveState();
  if (message) {
    toast(message, 'success');
  }
}

function deriveData(data){
  const refs = {
    employeesById: Object.fromEntries(data.employees.map((item) => [item.id, item])),
    employeesByName: Object.fromEntries(data.employees.map((item) => [item.name, item])),
    projectsById: Object.fromEntries(data.projects.map((item) => [item.id, item])),
    stagesById: Object.fromEntries(data.stages.map((item) => [item.id, item])),
    rolesByName: Object.fromEntries(data.roles.map((item) => [item.name, item])),
    templatesById: Object.fromEntries(data.templates.map((item) => [item.id, item])),
    templatesByName: Object.fromEntries(data.templates.map((item) => [item.name, item])),
    participationByName: Object.fromEntries(data.participationTypes.map((item) => [item.name, item])),
    presenceByCode: Object.fromEntries(data.presenceStatuses.map((item) => [item.code, item]))
  };

  const referenceDate = getReferenceDate(data);
  const horizonStart = data.meta.presenceHorizonStart;
  const horizonEnd = data.meta.presenceHorizonEnd;
  const weeks = getWeeksBetween(getWeekStartIso(horizonStart), getWeekStartIso(horizonEnd));
  const months = getMonthsBetween(horizonStart, horizonEnd);
  const currentWeekStart = getWeekStartIso(referenceDate);
  const presenceMap = new Map(data.presenceEntries.map((entry) => [`${entry.employeeId}|${entry.date}`, entry.statusCode]));

  const assignmentsByStage = groupBy(data.assignments, 'stageId');
  const assignmentsByEmployee = groupBy(data.assignments, 'employeeId');
  const stagesByProject = groupBy(data.stages, 'projectId');

  function getPresenceCode(employeeId, dateIso){
    if (!employeeId || !dateIso) return 'НФ';
    const explicit = presenceMap.get(`${employeeId}|${dateIso}`);
    if (explicit) return explicit;
    if (isWeekend(dateIso)) return 'В';
    return 'НФ';
  }

  function getPresenceStatus(employeeId, dateIso){
    const code = getPresenceCode(employeeId, dateIso);
    return refs.presenceByCode[code] || refs.presenceByCode['НФ'];
  }

  function getAvailabilityPct(employeeId, dateIso){
    return num(getPresenceStatus(employeeId, dateIso)?.availabilityPct, 100);
  }

  function getAbsenceImpact(employeeId, dateIso){
    const code = getPresenceCode(employeeId, dateIso);
    if (code === 'ОТ' || code === 'Б') return 1;
    if (code === 'БУ') return 0.5;
    return 0;
  }

  function getAssignmentRoleName(assignment){
    return assignment.stageRole || refs.employeesById[assignment.employeeId]?.role || '';
  }

  function fitsRoleForTarget(roleName, targetRoleName){
    if (!targetRoleName) return true;
    if (!roleName) return false;
    if (roleName === targetRoleName) return true;
    const role = refs.rolesByName[roleName];
    return ensureArray(role?.replacementRoles).includes(targetRoleName);
  }

  function getEmployeeRoleBasedTargetIds(employeeId){
    const employee = refs.employeesById[employeeId];
    const role = refs.rolesByName[employee?.role];
    const replacementRoles = ensureArray(role?.replacementRoles);
    if (!employee || !replacementRoles.length) return [];
    return unique(data.employees
      .filter((candidate) => candidate.id !== employeeId && replacementRoles.includes(candidate.role))
      .map((candidate) => candidate.id));
  }

  function getEmployeeExplicitTargetIds(employeeId){
    return unique(ensureArray(refs.employeesById[employeeId]?.substituteForEmployeeIds)
      .filter((targetId) => targetId !== employeeId && refs.employeesById[targetId]));
  }

  function getEmployeeSubstituteTargetIds(employeeId){
    return unique([
      ...getEmployeeRoleBasedTargetIds(employeeId),
      ...getEmployeeExplicitTargetIds(employeeId)
    ]);
  }

  function getSubstitutionSourceLabel(substituteEmployeeId, targetEmployeeId){
    const explicit = getEmployeeExplicitTargetIds(substituteEmployeeId).includes(targetEmployeeId);
    const roleBased = getEmployeeRoleBasedTargetIds(substituteEmployeeId).includes(targetEmployeeId);
    if (explicit && roleBased) return 'Явно и по роли';
    if (explicit) return 'Явно';
    if (roleBased) return 'По роли';
    return '';
  }

  function canEmployeeSubstituteEmployee(substituteEmployeeId, targetEmployeeId){
    if (!substituteEmployeeId || !targetEmployeeId || substituteEmployeeId === targetEmployeeId) return false;
    return getEmployeeSubstituteTargetIds(substituteEmployeeId).includes(targetEmployeeId);
  }

  const employeeRoleBasedTargets = Object.fromEntries(data.employees.map((employee) => [employee.id, getEmployeeRoleBasedTargetIds(employee.id)]));
  const employeeExplicitTargets = Object.fromEntries(data.employees.map((employee) => [employee.id, getEmployeeExplicitTargetIds(employee.id)]));
  const employeeSubstituteTargets = Object.fromEntries(data.employees.map((employee) => [employee.id, getEmployeeSubstituteTargetIds(employee.id)]));
  const employeeCoveredByIds = Object.fromEntries(data.employees.map((employee) => [
    employee.id,
    data.employees
      .filter((candidate) => canEmployeeSubstituteEmployee(candidate.id, employee.id))
      .map((candidate) => candidate.id)
  ]));

  function getParticipationWeight(typeName){
    return num(refs.participationByName[typeName]?.weight, 1);
  }

  function computeAbsenceDays(employeeId, startDate, endDate){
    const rangeStart = maxIso(startDate, horizonStart);
    const rangeEnd = minIso(endDate, horizonEnd);
    if (!rangeStart || !rangeEnd || rangeStart > rangeEnd) return 0;
    return round(listWorkdayIsosInRange(rangeStart, rangeEnd).reduce((sum, dateIso) => sum + getAbsenceImpact(employeeId, dateIso), 0), 1);
  }

  const stageAutoContext = {};
  data.stages.forEach((stage) => {
    const stageAssignments = assignmentsByStage[stage.id] || [];
    const totalWeight = stageAssignments.reduce((sum, assignment) => sum + getParticipationWeight(assignment.participationType), 0);
    stageAutoContext[stage.id] = {
      totalWeight,
      denominator: Math.max(num(stage.minPeople, 1), totalWeight || 0, 1)
    };
  });

  const assignmentMetrics = {};
  data.assignments.forEach((assignment) => {
    const stage = refs.stagesById[assignment.stageId];
    const roleName = getAssignmentRoleName(assignment);
    const autoLoadPct = stage
      ? round(num(stage.plannedLoadPct, 0) * getParticipationWeight(assignment.participationType) / stageAutoContext[assignment.stageId].denominator, 1)
      : 0;
    const hasManual = assignment.manualLoadPct !== null && assignment.manualLoadPct !== undefined && assignment.manualLoadPct !== '';
    const finalLoadPct = hasManual ? num(assignment.manualLoadPct, 0) : autoLoadPct;
    const absenceDays = computeAbsenceDays(assignment.employeeId, assignment.startDate, assignment.endDate);
    const roleFit = stage ? (fitsRoleForTarget(roleName, stage.leadRole) || fitsRoleForTarget(roleName, stage.supportRole)) : true;

    assignmentMetrics[assignment.id] = {
      weight: getParticipationWeight(assignment.participationType),
      autoLoadPct,
      finalLoadPct,
      absenceDays,
      roleFit,
      roleName
    };
  });

  const stageWeeklyPlanned = {};
  data.stages.forEach((stage) => {
    stageWeeklyPlanned[stage.id] = {};
    weeks.forEach((weekStart) => {
      const weekEnd = minIso(addDaysIso(weekStart, 4), horizonEnd);
      const weekRangeStart = maxIso(weekStart, horizonStart);
      if (!weekRangeStart || weekRangeStart > weekEnd) {
        stageWeeklyPlanned[stage.id][weekStart] = 0;
        return;
      }
      const weekWorkdays = countWorkdaysInRange(weekRangeStart, weekEnd);
      const overlapStart = maxIso(stage.startDate, weekStart, horizonStart);
      const overlapEnd = minIso(stage.endDate, addDaysIso(weekStart, 4), horizonEnd);
      const overlapWorkdays = countWorkdaysInRange(overlapStart, overlapEnd);
      stageWeeklyPlanned[stage.id][weekStart] = weekWorkdays > 0 ? round(num(stage.plannedLoadPct, 0) * overlapWorkdays / weekWorkdays, 1) : 0;
    });
  });

  const assignmentWeeklyLoad = {};
  data.assignments.forEach((assignment) => {
    assignmentWeeklyLoad[assignment.id] = {};
    weeks.forEach((weekStart) => {
      const weekEnd = minIso(addDaysIso(weekStart, 4), horizonEnd);
      const weekRangeStart = maxIso(weekStart, horizonStart);
      if (!weekRangeStart || weekRangeStart > weekEnd) {
        assignmentWeeklyLoad[assignment.id][weekStart] = 0;
        return;
      }
      const weekWorkdays = countWorkdaysInRange(weekRangeStart, weekEnd);
      const overlapStart = maxIso(assignment.startDate, weekStart, horizonStart);
      const overlapEnd = minIso(assignment.endDate, addDaysIso(weekStart, 4), horizonEnd);
      const overlapWorkdays = countWorkdaysInRange(overlapStart, overlapEnd);
      const finalLoadPct = assignmentMetrics[assignment.id]?.finalLoadPct || 0;
      assignmentWeeklyLoad[assignment.id][weekStart] = weekWorkdays > 0 && overlapWorkdays > 0
        ? round(finalLoadPct * overlapWorkdays / weekWorkdays, 1)
        : 0;
    });
  });

  const employeeWeeklyLoad = {};
  const projectEmployeeWeeklyLoad = {};
  data.employees.forEach((employee) => {
    employeeWeeklyLoad[employee.id] = Object.fromEntries(weeks.map((weekStart) => [weekStart, 0]));
  });
  data.projects.forEach((project) => {
    projectEmployeeWeeklyLoad[project.id] = {};
  });

  data.assignments.forEach((assignment) => {
    const stage = refs.stagesById[assignment.stageId];
    if (!employeeWeeklyLoad[assignment.employeeId]) {
      employeeWeeklyLoad[assignment.employeeId] = Object.fromEntries(weeks.map((weekStart) => [weekStart, 0]));
    }
    if (stage && !projectEmployeeWeeklyLoad[stage.projectId][assignment.employeeId]) {
      projectEmployeeWeeklyLoad[stage.projectId][assignment.employeeId] = Object.fromEntries(weeks.map((weekStart) => [weekStart, 0]));
    }
    weeks.forEach((weekStart) => {
      const value = assignmentWeeklyLoad[assignment.id][weekStart] || 0;
      employeeWeeklyLoad[assignment.employeeId][weekStart] = round((employeeWeeklyLoad[assignment.employeeId][weekStart] || 0) + value, 1);
      if (stage) {
        projectEmployeeWeeklyLoad[stage.projectId][assignment.employeeId][weekStart] = round((projectEmployeeWeeklyLoad[stage.projectId][assignment.employeeId][weekStart] || 0) + value, 1);
      }
    });
  });

  const employeeWeeklyAvailability = {};
  data.employees.forEach((employee) => {
    employeeWeeklyAvailability[employee.id] = {};
    weeks.forEach((weekStart) => {
      const weekStartClamped = maxIso(weekStart, horizonStart);
      const weekEnd = minIso(addDaysIso(weekStart, 4), horizonEnd);
      const workdays = listWorkdayIsosInRange(weekStartClamped, weekEnd);
      const availabilityPct = workdays.length
        ? round(workdays.reduce((sum, dateIso) => sum + getAvailabilityPct(employee.id, dateIso), 0) / workdays.length, 1)
        : 0;
      employeeWeeklyAvailability[employee.id][weekStart] = availabilityPct;
    });
  });

  function getOverlapWeeks(startDate, endDate){
    const rangeStart = maxIso(startDate, horizonStart);
    const rangeEnd = minIso(endDate, horizonEnd);
    if (!rangeStart || !rangeEnd || rangeStart > rangeEnd) return [];
    const startWeek = getWeekStartIso(rangeStart);
    const endWeek = getWeekStartIso(rangeEnd);
    return weeks.filter((weekStart) => weekStart >= startWeek && weekStart <= endWeek);
  }

  function canEmployeeCoverAdditionalLoad(employeeId, startDate, endDate, loadPct){
    const overlapWeeks = getOverlapWeeks(startDate, endDate);
    if (!overlapWeeks.length) return false;
    return overlapWeeks.every((weekStart) => {
      const availabilityPct = num(employeeWeeklyAvailability[employeeId]?.[weekStart], 100);
      const weeklyLoadPct = num(employeeWeeklyLoad[employeeId]?.[weekStart], 0);
      return availabilityPct > 0 && round(weeklyLoadPct + loadPct, 1) <= availabilityPct;
    });
  }

  function getAssignmentReplacementCandidateIds(assignment, metric){
    const targetRoleName = metric?.roleName || getAssignmentRoleName(assignment);
    return data.employees
      .filter((candidate) => {
        if (candidate.id === assignment.employeeId) return false;
        const explicit = canEmployeeSubstituteEmployee(candidate.id, assignment.employeeId);
        const roleBased = fitsRoleForTarget(candidate.role, targetRoleName);
        return explicit || roleBased;
      })
      .map((candidate) => candidate.id);
  }

  function getAssignmentAvailableReplacementIds(assignment, metric){
    return getAssignmentReplacementCandidateIds(assignment, metric)
      .filter((candidateId) => canEmployeeCoverAdditionalLoad(candidateId, assignment.startDate, assignment.endDate, metric?.finalLoadPct || 0));
  }

  const employeeMetrics = {};
  data.employees.forEach((employee) => {
    const assignments = assignmentsByEmployee[employee.id] || [];
    const projectIds = unique(assignments.map((assignment) => refs.stagesById[assignment.stageId]?.projectId).filter(Boolean));
    const stageIds = unique(assignments.map((assignment) => assignment.stageId));
    const weeklyLoads = Object.fromEntries(weeks.map((weekStart) => [weekStart, round(employeeWeeklyLoad[employee.id]?.[weekStart] || 0, 1)]));
    const peakLoadPct = Math.max(0, ...Object.values(weeklyLoads));
    const overloadedWeeks = Object.values(weeklyLoads).filter((value) => value > 100).length;
    const warningWeeks = Object.values(weeklyLoads).filter((value) => value >= 80 && value <= 100).length;
    const vacationsDays = listDatesInRange(horizonStart, horizonEnd).reduce((sum, dateIso) => sum + (getPresenceCode(employee.id, dateIso) === 'ОТ' ? 1 : 0), 0);
    const sickDays = round(listDatesInRange(horizonStart, horizonEnd).reduce((sum, dateIso) => {
      const code = getPresenceCode(employee.id, dateIso);
      if (code === 'Б') return sum + 1;
      if (code === 'БУ') return sum + 0.5;
      return sum;
    }, 0), 1);
    const currentAvailabilityPct = employeeWeeklyAvailability[employee.id]?.[currentWeekStart] || 0;
    const currentLoadPct = employeeWeeklyLoad[employee.id]?.[currentWeekStart] || 0;
    const availabilityLabel = currentAvailabilityPct === 0 ? 'Недоступен' : (currentAvailabilityPct < 100 ? 'Частично доступен' : 'Доступен');

    employeeMetrics[employee.id] = {
      assignments,
      projectIds,
      stageIds,
      weeklyLoads,
      peakLoadPct: round(peakLoadPct, 1),
      overloadedWeeks,
      warningWeeks,
      vacationsDays,
      sickDays,
      currentAvailabilityPct,
      currentLoadPct,
      availabilityLabel,
      roleBasedTargetIds: employeeRoleBasedTargets[employee.id] || [],
      explicitTargetIds: employeeExplicitTargets[employee.id] || [],
      substituteTargetIds: employeeSubstituteTargets[employee.id] || [],
      coveredByIds: employeeCoveredByIds[employee.id] || []
    };
  });

  Object.entries(assignmentMetrics).forEach(([assignmentId, metric]) => {
    const assignment = data.assignments.find((item) => item.id === assignmentId);
    const peakLoadPct = employeeMetrics[assignment.employeeId]?.peakLoadPct || 0;
    const replacementCandidateIds = getAssignmentReplacementCandidateIds(assignment, metric);
    const availableReplacementIds = getAssignmentAvailableReplacementIds(assignment, metric);
    const replacementStatus = !replacementCandidateIds.length
      ? 'Нет подмены'
      : (availableReplacementIds.length ? 'Подмена доступна' : 'Подмена есть, но занята');
    let risk = 'Норма';
    if (metric.absenceDays > 0 && peakLoadPct > 100 && !availableReplacementIds.length) risk = 'Отсутствие и перегруз без подмены';
    else if (metric.absenceDays > 0 && !availableReplacementIds.length) risk = 'Отсутствие без подмены';
    else if (metric.absenceDays > 0 && availableReplacementIds.length) risk = 'Отсутствие, есть подмена';
    else if (peakLoadPct > 100 && !availableReplacementIds.length) risk = 'Перегруз без подмены';
    else if (peakLoadPct > 100) risk = 'Перегруз';
    else if (!metric.roleFit) risk = 'Не по роли';
    assignmentMetrics[assignmentId].peakEmployeeLoadPct = peakLoadPct;
    assignmentMetrics[assignmentId].risk = risk;
    assignmentMetrics[assignmentId].replacementCandidateIds = replacementCandidateIds;
    assignmentMetrics[assignmentId].availableReplacementIds = availableReplacementIds;
    assignmentMetrics[assignmentId].replacementStatus = replacementStatus;
    assignmentMetrics[assignmentId].replacementSourceLabels = Object.fromEntries(replacementCandidateIds.map((employeeId) => [employeeId, getSubstitutionSourceLabel(employeeId, assignment.employeeId)]));
  });

  const stageMetrics = {};
  data.stages.forEach((stage) => {
    const stageAssignments = assignmentsByStage[stage.id] || [];
    const assignedEmployeeIds = unique(stageAssignments.map((assignment) => assignment.employeeId));
    const assignedPeopleCount = assignedEmployeeIds.length;
    const assignedLoadPct = round(stageAssignments.reduce((sum, assignment) => sum + (assignmentMetrics[assignment.id]?.finalLoadPct || 0), 0), 1);
    const uncoveredLoadPct = Math.max(0, round(num(stage.plannedLoadPct, 0) - assignedLoadPct, 1));
    const onePerson = assignedPeopleCount === 1;
    const noPeople = assignedPeopleCount === 0;
    const minPeopleShortage = Math.max(0, Math.round(num(stage.minPeople, 1)) - assignedPeopleCount);
    const leadCovered = !stage.leadRole || stageAssignments.some((assignment) => fitsRoleForTarget(assignmentMetrics[assignment.id]?.roleName, stage.leadRole));
    const supportCovered = !stage.supportRole || stageAssignments.some((assignment) => fitsRoleForTarget(assignmentMetrics[assignment.id]?.roleName, stage.supportRole));
    const suitableAssignmentsCount = stageAssignments.filter((assignment) => assignmentMetrics[assignment.id]?.roleFit).length;
    const missingLeadRole = !!stage.leadRole && !leadCovered;
    const missingSupportRole = !!stage.supportRole && !supportCovered;
    const reserveGap = stage.needsReserve && assignedPeopleCount < 2;
    const hasConflict = stageAssignments.some((assignment) => (assignmentMetrics[assignment.id]?.absenceDays || 0) > 0);
    const hasOverloadedAssignee = stageAssignments.some((assignment) => (employeeMetrics[assignment.employeeId]?.peakLoadPct || 0) > 100);
    const overdue = stage.status === 'Просрочено' || (stage.status !== 'Завершено' && stage.endDate < referenceDate);
    const leadCoverageCandidates = stage.leadRole
      ? data.employees.filter((employee) => fitsRoleForTarget(employee.role, stage.leadRole)).map((employee) => employee.id)
      : [];
    const supportCoverageCandidates = stage.supportRole
      ? data.employees.filter((employee) => fitsRoleForTarget(employee.role, stage.supportRole)).map((employee) => employee.id)
      : [];
    const availableReplacementIds = unique(stageAssignments.flatMap((assignment) => assignmentMetrics[assignment.id]?.availableReplacementIds || []));
    const replacementGapAssignments = stageAssignments.filter((assignment) => {
      const metric = assignmentMetrics[assignment.id];
      const needsReplacement = onePerson || stage.needsReserve || (metric?.absenceDays || 0) > 0 || (employeeMetrics[assignment.employeeId]?.peakLoadPct || 0) > 100;
      if (!needsReplacement) return false;
      return !(metric?.availableReplacementIds || []).length;
    });
    const replacementGapEmployeeIds = unique(replacementGapAssignments.map((assignment) => assignment.employeeId));
    const backupGap = replacementGapEmployeeIds.length > 0;
    const reasons = [];
    if (overdue) reasons.push('Срок этапа уже вышел');
    if (noPeople) reasons.push('Нет назначенных сотрудников');
    if (minPeopleShortage > 0) reasons.push(`Не хватает людей до минимального состава: ${minPeopleShortage}`);
    if (missingLeadRole) {
      reasons.push('Не закрыта ведущая роль');
      if (leadCoverageCandidates.length) {
        reasons.push(`Кого можно поставить на ведущую роль: ${leadCoverageCandidates.map((employeeId) => refs.employeesById[employeeId]?.name).filter(Boolean).join(', ')}`);
      }
    }
    if (missingSupportRole) {
      reasons.push('Не закрыта поддерживающая роль');
      if (supportCoverageCandidates.length) {
        reasons.push(`Кого можно поставить на поддерживающую роль: ${supportCoverageCandidates.map((employeeId) => refs.employeesById[employeeId]?.name).filter(Boolean).join(', ')}`);
      }
    }
    if (hasOverloadedAssignee) reasons.push('Назначенный сотрудник перегружен');
    if (hasConflict) reasons.push('Есть отпуск / больничный в период этапа');
    if (onePerson) reasons.push('Этап держится на одном сотруднике');
    if (reserveGap) reasons.push('Нужен резерв');
    if (backupGap) {
      reasons.push(`Нет доступной подмены для: ${replacementGapEmployeeIds.map((employeeId) => refs.employeesById[employeeId]?.name).filter(Boolean).join(', ')}`);
    } else if (availableReplacementIds.length) {
      reasons.push(`Доступная подмена: ${availableReplacementIds.map((employeeId) => refs.employeesById[employeeId]?.name).filter(Boolean).join(', ')}`);
    }
    if (uncoveredLoadPct > 0) reasons.push(`Незакрытая плановая загрузка: ${formatPct(uncoveredLoadPct)}`);
    const roleCoverageLabel = (!leadCovered || !supportCovered)
      ? 'Ролевой дефицит'
      : (backupGap ? 'Нет подмены' : reserveGap ? 'Нужен резерв' : 'Закрыто');

    let riskLevel = 'Норма';
    if (overdue) riskLevel = 'Просрочено';
    else if (noPeople || minPeopleShortage > 0 || missingLeadRole || missingSupportRole || hasOverloadedAssignee || hasConflict || backupGap) riskLevel = 'Риск';
    else if (onePerson || reserveGap || uncoveredLoadPct > 0) riskLevel = 'Внимание';

    stageMetrics[stage.id] = {
      stageAssignments,
      assignedPeopleCount,
      assignedEmployeeIds,
      assignedLoadPct,
      uncoveredLoadPct,
      onePerson,
      noPeople,
      minPeopleShortage,
      suitableAssignmentsCount,
      missingLeadRole,
      missingSupportRole,
      leadCovered,
      supportCovered,
      hasConflict,
      hasOverloadedAssignee,
      overdue,
      reserveGap,
      roleCoverageLabel,
      reasons,
      riskLevel,
      leadCoverageCandidates,
      supportCoverageCandidates,
      availableReplacementIds,
      replacementGapAssignments,
      replacementGapEmployeeIds,
      backupGap
    };
  });

  const projectMetrics = {};
  data.projects.forEach((project) => {
    const projectStages = (stagesByProject[project.id] || []).slice().sort((a, b) => compareIso(a.startDate, b.startDate));
    const projectAssignments = data.assignments.filter((assignment) => refs.stagesById[assignment.stageId]?.projectId === project.id);
    const participantIds = unique(projectAssignments.map((assignment) => assignment.employeeId));
    const riskyStages = projectStages.filter((stage) => ['Риск', 'Просрочено'].includes(stageMetrics[stage.id]?.riskLevel));
    const overdueStages = projectStages.filter((stage) => stageMetrics[stage.id]?.riskLevel === 'Просрочено');
    const attentionStages = projectStages.filter((stage) => stageMetrics[stage.id]?.riskLevel === 'Внимание');
    const shortageStages = projectStages.filter((stage) => (stageMetrics[stage.id]?.minPeopleShortage || 0) > 0);
    const roleGapStages = projectStages.filter((stage) => stageMetrics[stage.id]?.missingLeadRole || stageMetrics[stage.id]?.missingSupportRole);
    const conflictStages = projectStages.filter((stage) => stageMetrics[stage.id]?.hasConflict);
    const singleOwnerStages = projectStages.filter((stage) => stageMetrics[stage.id]?.onePerson);
    const substitutionGapStages = projectStages.filter((stage) => stageMetrics[stage.id]?.backupGap);
    const overloadedEmployeeIds = participantIds.filter((employeeId) =>
      weeks.some((weekStart) => num(projectEmployeeWeeklyLoad[project.id]?.[employeeId]?.[weekStart], 0) > 100)
    );
    const minStart = projectStages[0]?.startDate || horizonStart;
    const maxEnd = projectStages[projectStages.length - 1]?.endDate || horizonEnd;
    const projectWeeks = weeks.filter((weekStart) => weekStart >= getWeekStartIso(minStart) && weekStart <= getWeekStartIso(maxEnd));
    const riskScore = overdueStages.length * 4 + riskyStages.filter((stage) => stageMetrics[stage.id]?.riskLevel === 'Риск').length * 2 + attentionStages.length + shortageStages.length + roleGapStages.length + substitutionGapStages.length;

    projectMetrics[project.id] = {
      project,
      projectStages,
      projectAssignments,
      participantIds,
      participantCount: participantIds.length,
      stageCount: projectStages.length,
      riskyCount: riskyStages.length,
      overdueCount: overdueStages.length,
      attentionCount: attentionStages.length,
      shortageStages,
      roleGapStages,
      conflictStages,
      singleOwnerStages,
      substitutionGapStages,
      overloadedEmployeeIds,
      overloadedEmployeesCount: overloadedEmployeeIds.length,
      riskScore,
      weeks: projectWeeks.length ? projectWeeks : weeks.slice(),
      minStart,
      maxEnd,
      summary: projectStages.length
        ? `${projectStages.length} этапов • ${riskyStages.length} рискованных • ${overloadedEmployeeIds.length} перегруженных сотрудников • ${substitutionGapStages.length} без подмены`
        : 'Этапов пока нет'
    };
  });

  const teamWeekly = weeks.map((weekStart) => {
    const availableEq = round(data.employees.reduce((sum, employee) => sum + (employeeWeeklyAvailability[employee.id]?.[weekStart] || 0), 0) / 100, 2);
    const plannedEq = round(data.stages.reduce((sum, stage) => sum + (stageWeeklyPlanned[stage.id]?.[weekStart] || 0), 0) / 100, 2);
    const assignedEq = round(data.employees.reduce((sum, employee) => sum + (employeeWeeklyLoad[employee.id]?.[weekStart] || 0), 0) / 100, 2);
    const reserveEq = round(availableEq - plannedEq, 2);
    const overloadedEmployeesCount = data.employees.filter((employee) => (employeeWeeklyLoad[employee.id]?.[weekStart] || 0) > 100).length;
    const weekDates = listWorkdayIsosInRange(maxIso(weekStart, horizonStart), minIso(addDaysIso(weekStart, 4), horizonEnd));
    const absentKeyRoleDays = round(data.employees
      .filter((employee) => employee.isKey)
      .reduce((sum, employee) => sum + weekDates.reduce((innerSum, dateIso) => innerSum + getAbsenceImpact(employee.id, dateIso), 0), 0), 1);
    const vacationWindow = reserveEq >= 1 && overloadedEmployeesCount === 0 && absentKeyRoleDays === 0;
    const signal = reserveEq < 0 || overloadedEmployeesCount > 0 ? 'Напряжение' : (vacationWindow ? 'Окно' : 'Норма');

    return {
      weekStart,
      availableEq,
      plannedEq,
      assignedEq,
      reserveEq,
      overloadedEmployeesCount,
      absentKeyRoleDays,
      vacationWindow,
      signal,
      workdaysCount: weekDates.length
    };
  });

  const teamWeeklyByWeek = Object.fromEntries(teamWeekly.map((item) => [item.weekStart, item]));
  const employeeVacationWindow = {};
  data.employees.forEach((employee) => {
    employeeVacationWindow[employee.id] = {};
    weeks.forEach((weekStart) => {
      employeeVacationWindow[employee.id][weekStart] = Boolean(teamWeeklyByWeek[weekStart]?.vacationWindow) && (employeeWeeklyLoad[employee.id]?.[weekStart] || 0) <= 50;
    });
  });

  const dailySummary = {};
  listDatesInRange(horizonStart, horizonEnd).forEach((dateIso) => {
    let officeCount = 0;
    let remoteCount = 0;
    let absentCount = 0;
    let notFixedCount = 0;
    let availableEq = 0;
    data.employees.forEach((employee) => {
      const code = getPresenceCode(employee.id, dateIso);
      const status = refs.presenceByCode[code] || refs.presenceByCode['НФ'];
      availableEq += num(status.availabilityPct, 0) / 100;
      if (status.isOffice) officeCount += 1;
      if (['У', 'БУ', 'К'].includes(code)) remoteCount += 1;
      if (['ОТ', 'Б', 'БУ'].includes(code)) absentCount += 1;
      if (code === 'НФ') notFixedCount += 1;
    });
    dailySummary[dateIso] = {
      officeCount,
      remoteCount,
      absentCount,
      notFixedCount,
      availableEq: round(availableEq, 2)
    };
  });

  const presenceCounts = {};
  listDatesInRange(horizonStart, horizonEnd).forEach((dateIso) => {
    data.employees.forEach((employee) => {
      const code = getPresenceCode(employee.id, dateIso);
      presenceCounts[code] = (presenceCounts[code] || 0) + 1;
    });
  });

  const currentWeek = teamWeeklyByWeek[currentWeekStart] || teamWeekly[0] || null;

  return {
    data,
    refs,
    referenceDate,
    horizonStart,
    horizonEnd,
    weeks,
    months,
    currentWeekStart,
    currentWeek,
    assignmentsByStage,
    assignmentsByEmployee,
    stagesByProject,
    getPresenceCode,
    getPresenceStatus,
    getAvailabilityPct,
    getAbsenceImpact,
    getAssignmentRoleName,
    fitsRoleForTarget,
    getParticipationWeight,
    canEmployeeSubstituteEmployee,
    employeeRoleBasedTargets,
    employeeExplicitTargets,
    employeeSubstituteTargets,
    employeeCoveredByIds,
    stageWeeklyPlanned,
    assignmentWeeklyLoad,
    assignmentMetrics,
    employeeWeeklyLoad,
    employeeWeeklyAvailability,
    employeeMetrics,
    stageMetrics,
    projectEmployeeWeeklyLoad,
    projectMetrics,
    teamWeekly,
    teamWeeklyByWeek,
    employeeVacationWindow,
    dailySummary,
    presenceCounts
  };
}


function destroyCharts(){
  while (chartRegistry.length) {
    const chart = chartRegistry.pop();
    try { chart.destroy(); } catch (error) { /* ignore */ }
  }
}

function toast(message, type = 'info'){
  const toast = document.createElement('div');
  toast.className = `toast toast--${type}`;
  toast.innerHTML = `<div style="font-weight:800;margin-bottom:4px;">${type === 'danger' ? 'Ошибка' : type === 'success' ? 'Готово' : 'Сообщение'}</div><div>${esc(message)}</div>`;
  DOM.toastRoot.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(-8px)';
    setTimeout(() => toast.remove(), 240);
  }, 3200);
}

function renderLoadBar(plannedLoadPct, assignedLoadPct){
  if (plannedLoadPct <= 0) {
    return `<div class="mini-note">Плановая загрузка не задана</div>`;
  }
  const share = Math.min(160, (assignedLoadPct / plannedLoadPct) * 160);
  const toneClass = assignedLoadPct > plannedLoadPct ? 'loadbar__fill--danger' : (assignedLoadPct >= plannedLoadPct * 0.8 ? 'loadbar__fill--warn' : '');
  return `
    <div class="flex-col" style="gap:6px;">
      <div class="loadbar"><div class="loadbar__fill ${toneClass}" style="width:${Math.min(100, (assignedLoadPct / plannedLoadPct) * 100)}%;"></div></div>
      <div class="mini-note">${formatPct(assignedLoadPct)} из ${formatPct(plannedLoadPct)}</div>
    </div>
  `;
}

function makeHash(){
  if (ui.view === 'project' && ui.projectId) {
    return `#project/${encodeURIComponent(ui.projectId)}/${encodeURIComponent(ui.projectTab)}`;
  }
  return `#${ui.view}`;
}

function parseHash(){
  const rawHash = decodeURIComponent((location.hash || '#projects').replace(/^#/, ''));
  if (!rawHash) return;
  const parts = rawHash.split('/');
  if (parts[0] === 'project' && parts[1]) {
    ui.view = 'project';
    ui.projectId = parts[1];
    ui.projectTab = parts[2] || 'stages';
    return;
  }
  const allowed = ['projects', 'dashboard', 'presence', 'team', 'roles'];
  if (allowed.includes(parts[0])) {
    ui.view = parts[0];
  } else {
    ui.view = 'projects';
  }
}

function navigate(view, options = {}){
  ui.view = view;
  Object.assign(ui, options);
  const hash = makeHash();
  if (location.hash !== hash) {
    location.hash = hash;
  } else {
    renderApp();
  }
}

function renderBreadcrumbs(items){
  return items.map((item, index) => {
    const clickable = item.view ? `<button data-action="navigate" data-view="${esc(item.view)}" ${item.projectId ? `data-project-id="${esc(item.projectId)}"` : ''} ${item.projectTab ? `data-project-tab="${esc(item.projectTab)}"` : ''}>${esc(item.label)}</button>` : `<span>${esc(item.label)}</span>`;
    return `${clickable}${index < items.length - 1 ? `<span class="sep">/</span>` : ''}`;
  }).join('');
}

    case 'project':

  DOM.pageTitle.textContent = title;

function renderProjectsView(){
  const projects = appData.projects
    .map((project) => ({ project, metrics: derived.projectMetrics[project.id] }))
    .filter(({ project }) => {
      const query = ui.projectsSearch.trim().toLowerCase();
      const matchesSearch = !query || `${project.id} ${project.name}`.toLowerCase().includes(query);

      const matchesPriority = ui.projectsPriority === 'Все' || project.priority === ui.projectsPriority;
      return matchesSearch && matchesStatus && matchesPriority;
    })
    .sort((left, right) => {
      const riskCompare = right.metrics.riskScore - left.metrics.riskScore;
      if (riskCompare !== 0) return riskCompare;
      const priorityCompare = priorityWeight(right.project.priority) - priorityWeight(left.project.priority);

      return left.project.name.localeCompare(right.project.name, 'ru');

  const allProjectMetrics = Object.values(derived.projectMetrics);
  const riskyProjectsCount = allProjectMetrics.filter((metrics) => metrics.riskyCount > 0).length;

  const cards = projects.length
    ? `

function renderGantt(project, metrics, mode){
  const stages = metrics.projectStages;
  const projectStart = stages.reduce((min, stage) => min ? minIso(min, stage.startDate) : stage.startDate, '');
  const projectEnd = stages.reduce((max, stage) => max ? maxIso(max, stage.endDate) : stage.endDate, '');
  const timelineStart = getWeekStartIso(projectStart);
  const timelineEnd = addDaysIso(getWeekStartIso(projectEnd), 6);
  const totalDays = diffDays(timelineStart, timelineEnd) + 1;
  const dayWidth = 16;
  const timelineWidth = totalDays * dayWidth;
  const projectWeeks = metrics.weeks;
  const monthBands = [];
  let currentMonth = '';
  let currentMonthStart = '';
  projectWeeks.forEach((weekStart, index) => {
    const monthKey = weekStart.slice(0, 7);
    if (!currentMonth) {
      currentMonth = monthKey;
      currentMonthStart = weekStart;
    }
    const nextWeek = projectWeeks[index + 1];
    const nextMonth = nextWeek ? nextWeek.slice(0, 7) : null;
    if (monthKey !== nextMonth) {
      const bandStart = diffDays(timelineStart, currentMonthStart) * dayWidth;
      const bandEnd = diffDays(timelineStart, addDaysIso(weekStart, 6)) * dayWidth + dayWidth;
      monthBands.push({ monthKey, left: bandStart, width: Math.max(80, bandEnd - bandStart) });
      currentMonth = nextMonth;
      currentMonthStart = nextWeek;
    }
  });

  function barToneForStage(stage){
    return toneForRisk(derived.stageMetrics[stage.id]?.riskLevel || 'Норма');
  }

  function buildTimelineHeader(){
    return `
      <div class="gantt-head">
        <div class="gantt-label">
          <div class="strong">${mode === 'stages' ? 'Этап / люди' : 'Сотрудник / назначения'}</div>
          <div class="mini-note">Шкала по рабочему диапазону проекта</div>
        </div>
        <div class="gantt-timeline" style="width:${timelineWidth}px;">
          ${monthBands.map((band) => `<div class="gantt-month-band" style="left:${band.left}px;width:${band.width}px;">${esc(formatMonth(band.monthKey))}</div>`).join('')}
          ${projectWeeks.map((weekStart) => {
            const left = diffDays(timelineStart, weekStart) * dayWidth + 56;
            return `<div class="gantt-week-label" style="left:${left}px;">${esc(formatDateShort(weekStart))}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  }

  function leftForDate(dateIso){
    return diffDays(timelineStart, dateIso) * dayWidth;
  }

  if (mode === 'employees') {
    const rows = metrics.participantIds.map((employeeId) => {
      const employee = derived.refs.employeesById[employeeId];
      const employeeAssignments = metrics.projectAssignments
        .filter((assignment) => assignment.employeeId === employeeId)
        .map((assignment) => {
          const stage = derived.refs.stagesById[assignment.stageId];
          return {
            ...assignment,
            stage,
            startOffset: leftForDate(assignment.startDate),
            endOffset: leftForDate(assignment.endDate),
            width: (diffDays(assignment.startDate, assignment.endDate) + 1) * dayWidth
          };
        })
        .sort((left, right) => compareIso(left.startDate, right.startDate));

      const laneEnds = [];
      employeeAssignments.forEach((item) => {
        let laneIndex = laneEnds.findIndex((laneEnd) => item.startOffset > laneEnd);
        if (laneIndex === -1) {
          laneIndex = laneEnds.length;
          laneEnds.push(item.startOffset + item.width);
        } else {
          laneEnds[laneIndex] = item.startOffset + item.width;
        }
        item.lane = laneIndex;
      });
      const height = Math.max(74, laneEnds.length * 26 + 24);

      return `
        <div class="gantt-row gantt-row--employee" style="grid-template-columns:300px auto;">
          <div class="gantt-label" style="min-height:${height}px;">
            <div class="strong">${esc(employee?.name || employeeId)}</div>
            <div class="mini-note">${esc(employee?.role || '')} • пик ${formatPct(derived.employeeMetrics[employeeId]?.peakLoadPct || 0)}</div>
            <div class="chip-row">${employeeAssignments.map((item) => chip(item.stage.name, 'outline')).join('')}</div>
          </div>
          <div class="gantt-timeline" style="width:${timelineWidth}px;min-height:${height}px;">
            ${employeeAssignments.map((item) => {
              const stageMetric = derived.stageMetrics[item.stage.id];
              return `
                <div class="gantt-bar gantt-bar--${barToneForStage(item.stage)}"
                  style="left:${item.startOffset}px;top:${8 + item.lane * 26}px;width:${Math.max(40, item.width)}px;height:22px;padding:4px 8px;">
                  <div class="gantt-bar__title">${esc(item.stage.name)}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('');

    return `<div class="gantt-shell">${buildTimelineHeader()}${rows}</div>`;
  }

  const rows = stages.map((stage) => {
    const stageMetric = derived.stageMetrics[stage.id];
    const stageAssignments = derived.assignmentsByStage[stage.id] || [];
    const left = leftForDate(stage.startDate);
    const width = (diffDays(stage.startDate, stage.endDate) + 1) * dayWidth;
    const height = 76;
    return `
      <div class="gantt-row" style="grid-template-columns:300px auto;">
        <div class="gantt-label" style="min-height:${height}px;">
          <div class="strong">${esc(stage.name)}</div>
          <div class="mini-note">${formatDate(stage.startDate)} — ${formatDate(stage.endDate)}</div>
          <div class="chip-row">
            ${badge(stage.status, toneForStageStatus(stage.status))}
            ${badge(stageMetric.riskLevel, toneForRisk(stageMetric.riskLevel))}
            ${stage.needsReserve ? badge(stageMetric.reserveGap ? 'Нужен резерв' : 'Резерв учтён', stageMetric.reserveGap ? 'yellow' : 'green') : ''}
          </div>
        </div>
        <div class="gantt-timeline" style="width:${timelineWidth}px;min-height:${height}px;">
          <div class="gantt-bar gantt-bar--${barToneForStage(stage)}" style="left:${left}px;width:${Math.max(56, width)}px;">
            <div class="gantt-bar__title">${esc(stage.name)}</div>
            <div class="gantt-bar__sub">
              ${stageAssignments.length
                ? stageAssignments.map((assignment) => chip(derived.refs.employeesById[assignment.employeeId]?.name || assignment.employeeId, 'outline')).join('')
                : chip('Нет назначений', 'neutral')}
            </div>
          </div>
          ${stageMetric.overdue ? `<div class="gantt-flag">Просрочено</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `<div class="gantt-shell">${buildTimelineHeader()}${rows}</div>`;
}

function renderProjectLoadTab(project, metrics){
  const projectWeeks = metrics.weeks;
  const employees = metrics.participantIds
    .map((employeeId) => derived.refs.employeesById[employeeId])

    .filter((employee) => {
      const matchesEmployee = ui.projectLoadEmployee === 'Все' || employee.id === ui.projectLoadEmployee;

      return matchesEmployee && matchesRole;
    });

  const peakLoad = employees.length ? Math.max(...employees.map((employee) => {
    const weekValues = projectWeeks.map((weekStart) => num(derived.projectEmployeeWeeklyLoad[project.id]?.[employee.id]?.[weekStart], 0));
    return Math.max(0, ...weekValues);
  })) : 0;

  const overloadedWeeks = employees.reduce((sum, employee) => {
    return sum + projectWeeks.filter((weekStart) => num(derived.projectEmployeeWeeklyLoad[project.id]?.[employee.id]?.[weekStart], 0) > 100).length;
  }, 0);

  return `

            </select>
          </div>
        </div>
      </div>

      ${renderKpiCard('Участников', String(metrics.participantCount), 'Сотрудники, участвующие в проекте', 'blue')}
      ${renderKpiCard('Пик загрузки', formatPct(peakLoad), 'Максимум по сотрудникам в выбранных фильтрах', peakLoad > 100 ? 'red' : peakLoad >= 80 ? 'yellow' : 'green')}
      ${renderKpiCard('Перегруженные недели', String(overloadedWeeks), 'Сумма недель >100% у выбранных сотрудников', overloadedWeeks ? 'red' : 'green')}
      ${renderKpiCard('Этапов в проекте', String(metrics.stageCount), 'Связанный объём работ', 'blue')}

        <thead>
          <tr>
            <th class="sticky-col">Сотрудник</th>

function renderHeatmap({ rows, weeks }){
  return `
    <div class="heatmap-wrap">
      <table class="heatmap-table">
        <thead>
          <tr>
            <th class="sticky-col">Сотрудник / неделя</th>
            ${weeks.map((weekStart) => `<th>${esc(formatDateShort(weekStart))}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map((row) => `
            <tr>
              <th class="sticky-col">${esc(row.label)}</th>
              ${weeks.map((weekStart) => {
                const value = num(row.value(weekStart), 0);
                return `<td class="heatmap-cell ${value === 0 ? 'heatmap-cell--dim' : ''}" style="background:${loadBg(value)};" title="${esc(row.title(weekStart))}">${value ? formatPct(value) : '—'}</td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function makeChart(canvasId, config){

  const chart = new Chart(canvas.getContext('2d'), config);

}

function downloadBlob(filename, blob){
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}

function exportJson(){
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json;charset=utf-8' });
  downloadBlob('resource-planner-export.json', blob);
}

  const projectRows = appData.projects.map((project) => ({

    'Статус': project.status

    'Основание': role.basis,

    'Ведёт этап': role.canLead ? 'Да' : 'Нет',
    'Контур': role.contour,
    'Макс тяжёлых этапов': role.maxHeavy,
    'Макс обычных этапов': role.maxRegular,

  }));
  const participationRows = appData.participationTypes.map((item) => ({
    'ID': item.id,
    'Тип участия': item.name,
    'Вес': item.weight
  }));
  const templateRows = appData.templates.map((template) => ({
    'ID': template.id,
    'Шаблон этапа': template.name,
    'Типовые роли': template.typicalRoles.join(' | '),
    'Ведущая роль': template.leadRole,
    'Поддерживающая роль': template.supportRole,
    'Мин. людей': template.minPeople,
    'Нужен резерв': template.needsReserve ? 'Да' : 'Нет',
    'Типовая загрузка %': template.defaultLoadPct,
    'Нужен выезд / объект': template.onsiteRequired ? 'Да' : 'Нет',
    'Комментарий': template.comment
  }));
  const stageRows = appData.stages.map((stage) => ({
    'ID': stage.id,
    'Код проекта': stage.projectId,
    'Этап': stage.name,
    'Приоритет': stage.priority,
    'Старт': stage.startDate,
    'Финиш': stage.endDate,
    'Плановая загрузка %': stage.plannedLoadPct,
    'Статус': stage.status,
    'ID шаблона': stage.templateId,
    'Ведущая роль': stage.leadRole,
    'Поддерживающая роль': stage.supportRole,
    'Мин. людей': stage.minPeople,
    'Нужен резерв': stage.needsReserve ? 'Да' : 'Нет',
    'Комментарий': stage.comment
  }));
  const assignmentRows = appData.assignments.map((assignment) => ({
    'ID': assignment.id,
    'Код этапа': assignment.stageId,
    'ID сотрудника': assignment.employeeId,
    'Роль в этапе': assignment.stageRole,
    'Тип участия': assignment.participationType,
    'Ручная загрузка %': assignment.manualLoadPct,
    'Старт участия': assignment.startDate,
    'Финиш участия': assignment.endDate,
    'Комментарий': assignment.comment
  }));
  const presenceRows = appData.presenceEntries.map((entry) => ({
    'ID сотрудника': entry.employeeId,
    'Дата': entry.date,
    'Код статуса': entry.statusCode
  }));
  const presenceStatusRows = appData.presenceStatuses.map((status) => ({
    'Код': status.code,
    'Название': status.name,
    'Подпись': status.label,
    'Доступность %': status.availabilityPct,
    'В офисе': status.isOffice ? 'Да' : 'Нет',
    'Отсутствие': status.isAbsent ? 'Да' : 'Нет',
    'Комментарий': status.comment
  }));

  const sheets = [
    ['Метаданные', metaRows],
    ['Сотрудники', employeeRows],
    ['Проекты', projectRows],
    ['Роли', roleRows],
    ['Типы участия', participationRows],
    ['Шаблоны этапов', templateRows],
    ['Этапы', stageRows],
    ['Назначения', assignmentRows],
    ['Присутствие', presenceRows],
    ['Статусы присутствия', presenceStatusRows]
  ];

  sheets.forEach(([name, rows]) => {
    const sheet = XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(workbook, sheet, name);
  });

  XLSX.writeFile(workbook, 'resource-planner-export.xlsx');
}

async function importDataFile(file){
  const lowerName = file.name.toLowerCase();
  if (lowerName.endsWith('.json')) {
    const text = await file.text();
    const imported = normalizeData(JSON.parse(text));
    appData = imported;
    saveData('JSON успешно импортирован');
    renderApp();
    return;
  }
  if (lowerName.endsWith('.xlsx') || lowerName.endsWith('.xls')) {
    if (typeof XLSX === 'undefined') {
      throw new Error('Библиотека XLSX не загрузилась.');
    }
    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array', cellDates: true });
    const imported = workbook.SheetNames.includes('Сотрудники')
      ? parseAppWorkbook(workbook)
      : (workbook.SheetNames.includes('00_Справочники') ? parseSourceWorkbook(workbook) : null);

    if (!imported) {
      throw new Error('Не удалось распознать формат XLSX. Используйте экспорт этого приложения или исходный Excel-шаблон.');
    }
    appData = normalizeData(imported);
    if (!ui.projectId || !appData.projects.some((project) => project.id === ui.projectId)) {
      ui.projectId = appData.projects[0]?.id || null;
    }
    saveData('XLSX успешно импортирован');
    renderApp();
    return;
  }
  throw new Error('Поддерживаются только JSON и XLSX/XLS.');
}

function truthy(value){
  return ['да', 'true', '1', 'yes'].includes(String(value ?? '').trim().toLowerCase());
}
