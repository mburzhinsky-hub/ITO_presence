function parseSourceWorkbook(workbook){
  const toArray = (name) => XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, defval: null, raw: false });
  const source00 = toArray('00_Справочники');
  const source01 = toArray('01_Присутствие');
  const source02 = toArray('02_Этапы_проектов');
  const source03 = toArray('03_Назначения_Гант');
  const source06 = toArray('06_Роли_и_шаблоны');

  const employees = [];
  const nameToEmployeeId = {};
  for (let row = 3; row <= 14; row += 1) {
    const name = source00[row]?.[7];
    if (!name) continue;
    const employee = {
      id: `E${String(employees.length + 1).padStart(3, '0')}`,
      name,
      role: source00[row]?.[8] || '',
      isKey: truthy(source00[row]?.[9]),
      normDayPct: num(source00[row]?.[10], 1) * 100
    };
    employees.push(employee);
    nameToEmployeeId[name] = employee.id;
  }

  const projects = [];
  for (let row = 3; row < source00.length; row += 1) {
    const id = source00[row]?.[13];
    if (!id) continue;
    projects.push({
      id,
      name: source00[row]?.[14] || id,
      priority: source00[row]?.[15] || 'Средний',
      status: source00[row]?.[16] || 'Активный'
    });
  }

  const presenceStatuses = [];
  for (let row = 3; row <= 10; row += 1) {
    const code = source00[row]?.[0];
    if (!code) continue;
    presenceStatuses.push({
      code,
      name: source00[row]?.[1],
      label: ({ 'О':'В офисе','У':'Удаленно','ОТ':'Отпуск','Б':'Больничный','БУ':'Больничный + удаленка','В':'Выходной','Н':'Ночная смена','РВ':'Рабочий выходной' })[code] || source00[row]?.[1],
      availabilityPct: num(source00[row]?.[2], 0) * 100,
      isOffice: truthy(source00[row]?.[3]),
      isAbsent: truthy(source00[row]?.[4]),
      comment: source00[row]?.[5] || ''
    });
  }

  const roles = [];
  for (let row = 5; row <= 13; row += 1) {
    const name = source06[row]?.[0];
    if (!name) continue;
    roles.push({
      id: `R${String(roles.length + 1).padStart(3, '0')}`,
      name,
      basis: source06[row]?.[1] || '',
      replacementRoles: String(source06[row]?.[2] || '').split('|').map((item) => item.trim()).filter(Boolean),
      canLead: truthy(source06[row]?.[3]),
      contour: source06[row]?.[4] || '',
      maxHeavy: num(source06[row]?.[5], 0),
      maxRegular: num(source06[row]?.[6], 0),
      onsite: source06[row]?.[7] || '',
      comment: source06[row]?.[8] || ''
    });
  }

  const participationTypes = [];
  for (let row = 5; row <= 9; row += 1) {
    const name = source06[row]?.[10];
    if (!name) continue;
    participationTypes.push({
      id: `P${String(participationTypes.length + 1).padStart(3, '0')}`,
      name,
      weight: num(source06[row]?.[11], 1)
    });
  }

  const defaultLoadMap = {
    'Аналитика / обследование': 40,
    'Проектирование / документация': 100,
    'Документы / корректировки': 50,
    'Расчёты / подбор оборудования': 30,
    'Закупка / техоценка': 20,
    'Координация / управление': 80,
    'Монтаж / инсталляция': 60,
    'ПНР / интеграция': 40,
    'Сервис / поддержка': 20,
    'Приемка / сдача': 50,
    'Логистика / склад': 20,
    'Демонстрация / мероприятие': 20
  };

  const templates = [];
  for (let row = 5; row <= 16; row += 1) {
    const name = source06[row]?.[13];
    if (!name) continue;
    templates.push({
      id: `T${String(templates.length + 1).padStart(3, '0')}`,
      name,
      typicalRoles: unique([source06[row]?.[14], source06[row]?.[15]].filter(Boolean)),
      leadRole: source06[row]?.[14] || '',
      supportRole: source06[row]?.[15] || '',
      minPeople: Math.max(1, Math.round(num(source06[row]?.[16], 1))),
      needsReserve: truthy(source06[row]?.[17]),
      defaultLoadPct: defaultLoadMap[name] || 50,
      onsiteRequired: ['Монтаж / инсталляция', 'ПНР / интеграция', 'Сервис / поддержка', 'Приемка / сдача', 'Демонстрация / мероприятие', 'Аналитика / обследование', 'Логистика / склад'].includes(name),
      comment: source06[row]?.[18] || ''
    });
  }

  const templateByName = Object.fromEntries(templates.map((item) => [item.name, item]));
  const stages = [];
  for (let row = 3; row <= 21; row += 1) {
    const id = source02[row]?.[0];
    if (!id) continue;
    const template = templateByName[source02[row]?.[18]] || null;
    stages.push({
      id,
      projectId: source02[row]?.[1],
      name: source02[row]?.[3],
      priority: source02[row]?.[4],
      startDate: toISO(source02[row]?.[5]),
      endDate: toISO(source02[row]?.[6]),
      plannedLoadPct: num(source02[row]?.[7], 0) * 100,
      status: source02[row]?.[8],
      templateId: template?.id || '',
      leadRole: source02[row]?.[19] || template?.leadRole || '',
      supportRole: source02[row]?.[20] || template?.supportRole || '',
      minPeople: Math.max(1, Math.round(num(source02[row]?.[21], template?.minPeople || 1))),
      needsReserve: truthy(source02[row]?.[22]),
      comment: ''
    });
  }

  const assignments = [];
  for (let row = 3; row <= 21; row += 1) {
    const id = source03[row]?.[0];
    if (!id) continue;
    assignments.push({
      id,
      stageId: source03[row]?.[1],
      employeeId: nameToEmployeeId[source03[row]?.[3]],
      stageRole: source03[row]?.[4] || '',
      participationType: source03[row]?.[7] || 'Основной',
      manualLoadPct: source03[row]?.[9] === null || source03[row]?.[9] === '' ? null : num(source03[row]?.[9], 0) * 100,
      startDate: toISO(source03[row]?.[5]),
      endDate: toISO(source03[row]?.[6]),
      comment: ''
    });
  }

  const presenceEntries = [];
  for (let row = 4; row <= 15; row += 1) {
    const employeeName = source01[row]?.[0];
    if (!employeeName) continue;
    for (let col = 4; col < source01[row].length; col += 1) {
      const date = toISO(source01[1]?.[col]);
      const code = source01[row]?.[col];
      if (!date || !code) continue;
      if (!isWeekend(date)) {
        presenceEntries.push({
          employeeId: nameToEmployeeId[employeeName],
          date,
          statusCode: code
        });
      }
    }
  }

  return {
    meta: {
      title: 'Планирование ресурсов инженерной команды',
      snapshotDate: '2026-04-09',
      presenceHorizonStart: toISO(source01[1]?.[4]) || '2026-04-08',
      unfixedRuleStart: '2026-04-13',
      presenceHorizonEnd: toISO(source01[1]?.[source01[1].length - 1]) || '2026-12-31',
      source: 'Excel + должностные инструкции'
    },
    projectStatuses: ['Активный', 'Сопровождение', 'Постобслуживание', 'Пауза', 'Завершен'],
    stageStatuses: ['Запланировано', 'В работе', 'Просрочено', 'Завершено'],
    riskStatuses: ['Норма', 'Внимание', 'Риск', 'Просрочено'],
    presenceStatuses,
    employees,
    projects,
    roles,
    participationTypes,
    templates,
    stages,
    assignments,
    presenceEntries
  };
}


function setPresenceValue(employeeId, dateIso, statusCode){
  const keyIndex = appData.presenceEntries.findIndex((entry) => entry.employeeId === employeeId && entry.date === dateIso);
  const shouldDelete = statusCode === 'НФ' || (statusCode === 'В' && isWeekend(dateIso));
  if (shouldDelete) {
    if (keyIndex >= 0) appData.presenceEntries.splice(keyIndex, 1);
    return;
  }
  if (keyIndex >= 0) {
    appData.presenceEntries[keyIndex].statusCode = statusCode;
  } else {
    appData.presenceEntries.push({ employeeId, date: dateIso, statusCode });
  }
}

  openModal({

    content,

      const form = modal.querySelector('form');
      const stageSelect = form.querySelector('[name="stageId"]');
      const startInput = form.querySelector('[name="startDate"]');
      const endInput = form.querySelector('[name="endDate"]');
      const employeeSearch = form.querySelector('[name="employeeSearch"]');
      const container = modal.querySelector('#bulkAssignmentEmployees');

      const refreshEmployees = () => {
        const stage = derived.refs.stagesById[stageSelect.value];
        if (stage) {
          startInput.value = startInput.value || stage.startDate;
          endInput.value = endInput.value || stage.endDate;
        }
        const query = employeeSearch.value.trim().toLowerCase();
        const existingEmployees = new Set((derived.assignmentsByStage[stageSelect.value] || []).map((assignment) => assignment.employeeId));
        container.innerHTML = appData.employees
          .filter((employee) => !query || `${employee.name} ${employee.role}`.toLowerCase().includes(query))
          .map((employee) => {
            const disabled = existingEmployees.has(employee.id);
            return `
              <label class="checkbox" style="padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:${disabled ? '#f8fafc' : '#fff'};">

                  <strong>${esc(employee.name)}</strong><br>
                  <span class="mini-note">${esc(employee.role)} ${disabled ? '• уже назначен' : ''}</span>
                </span>
              </label>
            `;
          }).join('');
      };

      stageSelect.addEventListener('change', () => {
        const stage = derived.refs.stagesById[stageSelect.value];
        if (stage) {
          startInput.value = stage.startDate;
          endInput.value = stage.endDate;
        }
        refreshEmployees();
      });
      employeeSearch.addEventListener('input', refreshEmployees);
      const initialStage = derived.refs.stagesById[stageSelect.value];
      if (initialStage) {
        startInput.value = initialStage.startDate;
        endInput.value = initialStage.endDate;
      }
      refreshEmployees();
    }
  });
}

              <td>${safeText(assignment.participationType)}</td>
              <td>${badge(formatPct(metric.finalLoadPct), toneForLoadPct(metric.finalLoadPct))}</td>
              <td>${formatDate(assignment.startDate)} — ${formatDate(assignment.endDate)}</td>
              <td>
                ${badge(metric.replacementStatus, metric.replacementStatus === 'Подмена доступна' ? 'green' : metric.replacementStatus === 'Нет подмены' ? 'red' : 'yellow')}
                <div class="mini-note" style="margin-top:6px;">
                  ${metric.availableReplacementIds.length
                    ? metric.availableReplacementIds.map((employeeId) => derived.refs.employeesById[employeeId]?.name || employeeId).join(', ')
                    : metric.replacementCandidateIds.length
                      ? metric.replacementCandidateIds.map((employeeId) => derived.refs.employeesById[employeeId]?.name || employeeId).join(', ')
                      : 'Не указана'}
                </div>
              </td>
              <td>${badge(metric.risk, metric.risk === 'Норма' ? 'green' : metric.risk.includes('без подмены') || metric.risk.includes('Перегруз') ? 'red' : metric.risk.includes('Отсутствие') ? 'yellow' : 'violet')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </section>
    <section class="panel">
      <h3 class="section-title">Присутствие в месяце</h3>
      <p class="section-subtitle">${esc(formatMonth(monthKey))}</p>
      <div class="heatmap-wrap">
        <table class="presence-table">
          <thead>
            <tr>
              ${dates.map((dateIso) => `<th>${esc(formatDateShort(dateIso))}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            <tr>
              ${dates.map((dateIso) => {
                const code = derived.getPresenceCode(employee.id, dateIso);
                return `<td><div class="presence-cell presence-cell--${esc(code)}" style="margin:auto;" title="${esc(derived.getPresenceStatus(employee.id, dateIso).label)}">${esc(code)}</div></td>`;
              }).join('')}
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  `;

  openModal({
    title: employee.name,
    subtitle: employee.role,
    wide: true,
    content,
    onOpen() {
      makeChart(chartId, {
        type: 'bar',
        data: {
          labels: derived.weeks.map((weekStart) => formatDateShort(weekStart)),
          datasets: [
            {
              type: 'bar',
              label: 'Загрузка, %',
              data: derived.weeks.map((weekStart) => num(derived.employeeWeeklyLoad[employee.id]?.[weekStart], 0)),
              backgroundColor: 'rgba(37,99,235,.55)',
              borderRadius: 8
            },
            {
              type: 'line',
              label: 'Доступность, %',
              data: derived.weeks.map((weekStart) => num(derived.employeeWeeklyAvailability[employee.id]?.[weekStart], 0)),
              borderColor: '#16a34a',
              backgroundColor: 'rgba(22,163,74,.12)',
              tension: 0.25,
              pointRadius: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: { y: { beginAtZero: true } },
          plugins: { legend: { position: 'top' } }
        }
      });
    }
  });
}


function openSubstitutionModal(employeeId){
  const employee = derived.refs.employeesById[employeeId];
  if (!employee) return;
  const metrics = derived.employeeMetrics[employeeId];
  const content = `
    <form data-form="employee-substitutions" class="flex-col" style="gap:18px;">
      <input type="hidden" name="employeeId" value="${esc(employee.id)}" />
      <div class="callout callout--blue">
        <div class="callout__title">Как работает подмена</div>
        <div>Система уже использует подмену по ролям из матрицы ролей. В этом окне можно явно указать конкретных людей, которых <strong>${esc(employee.name)}</strong> может подменять сверх базовой роли.</div>
      </div>
      <div class="form-grid form-grid--3">
        <div class="field field--full">
          <label>Подмена по роли (работает автоматически)</label>
          <div class="chip-row">${metrics.roleBasedTargetIds.length ? metrics.roleBasedTargetIds.map((targetId) => chip(derived.refs.employeesById[targetId]?.name || targetId, 'outline')).join('') : chip('По роли никого не подменяет', 'neutral')}</div>
          <div class="mini-note" style="margin-top:8px;">Этот список меняется в разделе «Роли и шаблоны этапов», потому что он зависит от матрицы ролей.</div>
        </div>
        <div class="field field--full">
          <label for="substitutionSearch">Поиск по сотрудникам</label>
          <input id="substitutionSearch" name="substitutionSearch" class="input" placeholder="Имя, роль или проект" />
        </div>
        <div class="field field--full">
          <label>Явно указать, кого может подменить ${esc(employee.name)}</label>
          <div id="substitutionTargets" class="checkbox-grid"></div>
        </div>
        <div class="field field--full">
          <label>Комментарий по подмене</label>
          <textarea name="substituteNote" class="textarea" placeholder="Например: может подхватывать только удалённые задачи, без выездов">${esc(employee.substituteNote || '')}</textarea>
        </div>
        <div class="field field--full">
          <label>Кто может подменить этого сотрудника сейчас</label>
          <div class="chip-row">${metrics.coveredByIds.length ? metrics.coveredByIds.map((sourceId) => chip(derived.refs.employeesById[sourceId]?.name || sourceId, 'outline')).join('') : chip('Нет подмены', 'red')}</div>
        </div>
      </div>
      <div class="modal__footer">
        <div class="mini-note">Отсутствие подмены влияет на риск этапа, если этап завязан на одном человеке, есть перегруз или конфликт по присутствию.</div>
        <div class="btn-group">
          <button type="button" class="btn" data-action="close-modal">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить подмену</button>
        </div>
      </div>
    </form>
  `;

  openModal({
    title: `Подмена: ${employee.name}`,
    subtitle: employee.role,
    wide: true,
    content,
    onOpen(modal) {
      const container = modal.querySelector('#substitutionTargets');
      const searchInput = modal.querySelector('[name="substitutionSearch"]');
      const selectedIds = new Set(employee.substituteForEmployeeIds || []);
      const renderTargets = () => {
        const query = String(searchInput.value || '').trim().toLowerCase();
        container.innerHTML = appData.employees
          .filter((candidate) => candidate.id !== employee.id)
          .filter((candidate) => {
            if (!query) return true;
            return `${candidate.name} ${candidate.role}`.toLowerCase().includes(query);
          })
          .map((candidate) => `
            <label class="check-card">
              <div style="display:flex;gap:10px;align-items:flex-start;">
                <input type="checkbox" name="substituteForEmployeeIds" value="${esc(candidate.id)}" ${selectedIds.has(candidate.id) ? 'checked' : ''} />
                <div class="check-card__meta">
                  <div class="strong">${esc(candidate.name)}</div>
                  <div class="mini-note">${esc(candidate.role)}</div>
                </div>
              </div>
              <div class="chip-row">
                ${metrics.roleBasedTargetIds.includes(candidate.id) ? chip('По роли', 'green') : ''}
                ${selectedIds.has(candidate.id) ? chip('Явно', 'blue') : ''}
              </div>
            </label>
          `).join('');
      };
      renderTargets();
      searchInput.addEventListener('input', renderTargets);
      container.addEventListener('change', (event) => {
        const input = event.target;
        if (!(input instanceof HTMLInputElement)) return;
        if (input.checked) selectedIds.add(input.value);
        else selectedIds.delete(input.value);
        renderTargets();
      });
    }
  });
}


function handleClick(event){
  const navButton = event.target.closest('[data-nav]');
  if (navButton) {
    const view = navButton.dataset.nav;
    navigate(view);
    return;
  }

  const actionTarget = event.target.closest('[data-action]');
  if (!actionTarget) return;
  const { action } = actionTarget.dataset;

  switch (action) {
    case 'navigate':
      navigate(actionTarget.dataset.view, {
        projectId: actionTarget.dataset.projectId || ui.projectId,
        projectTab: actionTarget.dataset.projectTab || ui.projectTab
      });
      return;
    case 'open-project':
      ui.projectId = actionTarget.dataset.projectId;
      ui.projectTab = 'stages';
      ui.projectStageSearch = '';
      ui.projectStageStatus = 'Все';
      ui.projectStageRisk = 'Все';
      ui.projectAssignmentStage = 'Все';
      ui.projectAssignmentEmployee = 'Все';
      ui.projectLoadEmployee = 'Все';
      ui.projectLoadRole = 'Все';
      ui.projectGanttMode = 'stages';
      navigate('project', { projectId: ui.projectId, projectTab: ui.projectTab });
      return;
    case 'project-tab':
      ui.projectTab = actionTarget.dataset.projectTab;
      navigate('project', { projectId: ui.projectId, projectTab: ui.projectTab });
      return;
    case 'set-gantt-mode':
      ui.projectGanttMode = actionTarget.dataset.mode;
      renderApp();
      return;
    case 'close-modal':
      closeModal();
      return;
    case 'import-data':
      DOM.importInput.click();
      return;
    case 'export-json':
      exportJson();
      return;
    case 'export-xlsx':
      exportXlsx();
      return;
    case 'reset-data':
      if (confirm('Сбросить все изменения и вернуть встроенные данные из Excel?')) {
        resetDataToInitial();
      }
      return;
    case 'add-stage':
      openStageModal(null, actionTarget.dataset.projectId || ui.projectId);
      return;
    case 'edit-stage':
      openStageModal(actionTarget.dataset.stageId);
      return;
    case 'delete-stage': {
      const stageId = actionTarget.dataset.stageId;
      const stage = appData.stages.find((item) => item.id === stageId);
      if (!stage) return;
      if (!confirm(`Удалить этап «${stage.name}» и все его назначения?`)) return;
      appData.assignments = appData.assignments.filter((assignment) => assignment.stageId !== stageId);
      appData.stages = appData.stages.filter((item) => item.id !== stageId);
      saveData('Этап удалён');
      renderApp();
      return;
    }
    case 'bulk-assign':
      openBulkAssignmentModal(actionTarget.dataset.stageId || '');
      return;
    case 'edit-assignment':
      openAssignmentModal(actionTarget.dataset.assignmentId);
      return;
    case 'delete-assignment': {
      const assignmentId = actionTarget.dataset.assignmentId;
      const assignment = appData.assignments.find((item) => item.id === assignmentId);
      if (!assignment) return;
      if (!confirm('Удалить это назначение?')) return;
      appData.assignments = appData.assignments.filter((item) => item.id !== assignmentId);
      saveData('Назначение удалено');
      renderApp();
      return;
    }
    case 'set-presence-brush':
      ui.presenceBrush = actionTarget.dataset.code;
      renderApp();
      return;
    case 'presence-cell': {
      const employeeId = actionTarget.dataset.employeeId;
      const dateIso = actionTarget.dataset.date;
      setPresenceValue(employeeId, dateIso, ui.presenceBrush);
      saveData('');
      renderApp();
      return;
    }
    case 'open-employee':
      openEmployeeModal(actionTarget.dataset.employeeId);
      return;
    case 'edit-substitutions':
      openSubstitutionModal(actionTarget.dataset.employeeId);
      return;
    case 'add-role':
      openRoleModal();
      return;
    case 'edit-role':
      openRoleModal(actionTarget.dataset.roleId);
      return;
    case 'delete-role': {
      const roleId = actionTarget.dataset.roleId;
      const role = appData.roles.find((item) => item.id === roleId);
      if (!role) return;
      const used = appData.employees.some((employee) => employee.role === role.name)
        || appData.stages.some((stage) => stage.leadRole === role.name || stage.supportRole === role.name)
        || appData.templates.some((template) => template.leadRole === role.name || template.supportRole === role.name || template.typicalRoles.includes(role.name));
      if (used) {
        toast('Роль используется в сотрудниках, этапах или шаблонах. Сначала снимите ссылки на неё.', 'danger');
        return;
      }
      if (!confirm(`Удалить роль «${role.name}»?`)) return;
      appData.roles = appData.roles.filter((item) => item.id !== roleId);
      saveData('Роль удалена');
      renderApp();
      return;
    }
    case 'add-template':
      openTemplateModal();
      return;
    case 'edit-template':
      openTemplateModal(actionTarget.dataset.templateId);
      return;
    case 'delete-template': {
      const templateId = actionTarget.dataset.templateId;
      const template = appData.templates.find((item) => item.id === templateId);
      if (!template) return;
      const used = appData.stages.some((stage) => stage.templateId === templateId);
      if (used) {
        toast('Шаблон используется в этапах. Сначала снимите ссылки на него в этапах.', 'danger');
        return;
      }
      if (!confirm(`Удалить шаблон «${template.name}»?`)) return;
      appData.templates = appData.templates.filter((item) => item.id !== templateId);
      saveData('Шаблон удалён');
      renderApp();
      return;
    }
    default:
      return;
  }
}

function handleInputOrChange(event){
  const target = event.target;

  if (target.dataset.uiKey) {
    ui[target.dataset.uiKey] = target.type === 'checkbox' ? target.checked : target.value;
    renderApp();
    return;
  }

  if (target.dataset.action === 'participation-weight') {
    if (event.type !== 'change') return;
    const item = appData.participationTypes.find((entry) => entry.id === target.dataset.participationId);
    if (!item) return;
    item.weight = Math.max(0, num(target.value, item.weight));
    saveData('');
    renderApp();
  }
}

function handleSubmit(event){
  const form = event.target;
  if (!(form instanceof HTMLFormElement)) return;
  const formType = form.dataset.form;
  if (!formType) return;
  event.preventDefault();

  if (formType === 'presence-bulk') {
    const formData = new FormData(form);
    const employeeId = String(formData.get('employeeId') || 'ВСЕ');
    const startDate = toISO(formData.get('startDate'));
    const endDate = toISO(formData.get('endDate'));
    const statusCode = String(formData.get('statusCode') || 'НФ');
    if (!startDate || !endDate || startDate > endDate) {
      toast('Проверьте диапазон дат для массовой проставки.', 'danger');
      return;
    }
    const employeeIds = employeeId === 'ВСЕ' ? appData.employees.map((employee) => employee.id) : [employeeId];
    employeeIds.forEach((currentEmployeeId) => {
      listDatesInRange(startDate, endDate).forEach((dateIso) => {
        setPresenceValue(currentEmployeeId, dateIso, statusCode);
      });
    });
    saveData('Статусы присутствия обновлены');
    renderApp();
    return;
  }

  if (formType === 'stage') {
    const formData = new FormData(form);
    const payload = {
      id: String(formData.get('id') || ''),
      projectId: String(formData.get('projectId') || ''),
      name: String(formData.get('name') || '').trim(),
      templateId: String(formData.get('templateId') || ''),
      priority: String(formData.get('priority') || 'Средний'),
      status: String(formData.get('status') || 'Запланировано'),
      startDate: toISO(formData.get('startDate')),
      endDate: toISO(formData.get('endDate')),
      plannedLoadPct: num(formData.get('plannedLoadPct'), 0),
      minPeople: Math.max(1, Math.round(num(formData.get('minPeople'), 1))),
      leadRole: String(formData.get('leadRole') || ''),
      supportRole: String(formData.get('supportRole') || ''),
      needsReserve: formData.get('needsReserve') === 'on',
      comment: String(formData.get('comment') || '').trim()
    };
    if (!payload.name || !payload.projectId || !payload.startDate || !payload.endDate || payload.startDate > payload.endDate) {
      toast('Проверьте обязательные поля этапа и диапазон дат.', 'danger');
      return;
    }
    if (!payload.id) {
      payload.id = makeId('S', appData.stages);
      appData.stages.push(payload);
    } else {
      const index = appData.stages.findIndex((item) => item.id === payload.id);
      if (index >= 0) appData.stages[index] = payload;
    }
    saveData('Этап сохранён');
    closeModal();
    ui.projectId = payload.projectId;
    navigate('project', { projectId: payload.projectId, projectTab: 'stages' });
    return;
  }

  if (formType === 'bulk-assignment') {
    const formData = new FormData(form);
    const stageId = String(formData.get('stageId') || '');
    const stage = derived.refs.stagesById[stageId];
    const startDate = toISO(formData.get('startDate')) || stage?.startDate || '';
    const endDate = toISO(formData.get('endDate')) || stage?.endDate || '';
    const participationType = String(formData.get('participationType') || 'Основной');
    const manualRaw = formData.get('manualLoadPct');
    const manualLoadPct = manualRaw === null || manualRaw === '' ? null : num(manualRaw, 0);
    const comment = String(formData.get('comment') || '').trim();
    const employeeIds = formData.getAll('employeeIds').map(String);

    if (!stage || !startDate || !endDate || startDate > endDate) {
      toast('Проверьте выбранный этап и даты участия.', 'danger');
      return;
    }
    if (!employeeIds.length) {
      toast('Выберите хотя бы одного сотрудника.', 'danger');
      return;
    }

    let created = 0;
    employeeIds.forEach((employeeId) => {
      const alreadyExists = appData.assignments.some((assignment) => assignment.stageId === stageId && assignment.employeeId === employeeId);
      if (alreadyExists) return;
      const employee = derived.refs.employeesById[employeeId];
      appData.assignments.push({
        id: makeId('A', appData.assignments),
        stageId,
        employeeId,
        stageRole: employee?.role || '',
        participationType,
        manualLoadPct,
        startDate,
        endDate,
        comment
      });
      created += 1;
    });

    if (!created) {
      toast('Все выбранные сотрудники уже назначены на этот этап.', 'danger');
      return;
    }
    saveData(`Добавлено назначений: ${created}`);
    closeModal();
    renderApp();
    return;
  }

  if (formType === 'assignment') {
    const formData = new FormData(form);
    const payload = {
      id: String(formData.get('id') || ''),
      stageId: String(formData.get('stageId') || ''),
      employeeId: String(formData.get('employeeId') || ''),
      stageRole: String(formData.get('stageRole') || ''),
      participationType: String(formData.get('participationType') || 'Основной'),
      manualLoadPct: formData.get('manualLoadPct') === null || formData.get('manualLoadPct') === '' ? null : num(formData.get('manualLoadPct'), 0),
      startDate: toISO(formData.get('startDate')),
      endDate: toISO(formData.get('endDate')),
      comment: String(formData.get('comment') || '').trim()
    };
    if (!payload.stageId || !payload.employeeId || !payload.startDate || !payload.endDate || payload.startDate > payload.endDate) {
      toast('Проверьте поля назначения и диапазон дат.', 'danger');
      return;
    }
    const duplicate = appData.assignments.some((assignment) => assignment.id !== payload.id && assignment.stageId === payload.stageId && assignment.employeeId === payload.employeeId);
    if (duplicate) {
      toast('У выбранного этапа уже есть строка для этого сотрудника. Используйте существующее назначение.', 'danger');
      return;
    }
    const index = appData.assignments.findIndex((item) => item.id === payload.id);
    if (index >= 0) {
      appData.assignments[index] = payload;
      saveData('Назначение сохранено');
      closeModal();
      renderApp();
    }
    return;
  }

  if (formType === 'employee-substitutions') {
    const formData = new FormData(form);
    const employeeId = String(formData.get('employeeId') || '');
    const employee = appData.employees.find((item) => item.id === employeeId);
    if (!employee) {
      toast('Сотрудник не найден.', 'danger');
      return;
    }
    employee.substituteForEmployeeIds = unique(formData.getAll('substituteForEmployeeIds').map(String).filter((targetId) => targetId && targetId !== employeeId));
    employee.substituteNote = String(formData.get('substituteNote') || '').trim();
    saveData('Матрица подмены сохранена');
    closeModal();
    renderApp();
    return;
  }

  if (formType === 'role') {
    const formData = new FormData(form);
    const replacementRolesSelect = form.querySelector('[name="replacementRoles"]');
    const replacementRoles = Array.from(replacementRolesSelect.selectedOptions).map((option) => option.value);
    const payload = {
      id: String(formData.get('id') || ''),
      name: String(formData.get('name') || '').trim(),
      basis: String(formData.get('basis') || '').trim(),
      replacementRoles,
      canLead: formData.get('canLead') === 'on',
      contour: String(formData.get('contour') || '').trim(),
      maxHeavy: num(formData.get('maxHeavy'), 0),
      maxRegular: num(formData.get('maxRegular'), 0),
      onsite: String(formData.get('onsite') || '').trim(),
      comment: String(formData.get('comment') || '').trim()
    };
    if (!payload.name) {
      toast('Введите название роли.', 'danger');
      return;
    }
    if (!payload.id) {
      payload.id = makeId('R', appData.roles);
      appData.roles.push(payload);
    } else {
      const index = appData.roles.findIndex((item) => item.id === payload.id);
      if (index >= 0) appData.roles[index] = payload;
    }
    saveData('Роль сохранена');
    closeModal();
    renderApp();
    return;
  }

  if (formType === 'template') {
    const formData = new FormData(form);
    const typicalRolesSelect = form.querySelector('[name="typicalRoles"]');
    const typicalRoles = Array.from(typicalRolesSelect.selectedOptions).map((option) => option.value);
    const payload = {
      id: String(formData.get('id') || ''),
      name: String(formData.get('name') || '').trim(),
      typicalRoles,
      leadRole: String(formData.get('leadRole') || '').trim(),
      supportRole: String(formData.get('supportRole') || '').trim(),
      minPeople: Math.max(1, Math.round(num(formData.get('minPeople'), 1))),
      needsReserve: formData.get('needsReserve') === 'on',
      defaultLoadPct: num(formData.get('defaultLoadPct'), 0),
      onsiteRequired: formData.get('onsiteRequired') === 'on',
      comment: String(formData.get('comment') || '').trim()
    };
    if (!payload.name) {
      toast('Введите название шаблона.', 'danger');
      return;
    }
    if (!payload.id) {
      payload.id = makeId('T', appData.templates);
      appData.templates.push(payload);
    } else {
      const index = appData.templates.findIndex((item) => item.id === payload.id);
      if (index >= 0) appData.templates[index] = payload;
    }
    saveData('Шаблон сохранён');
    closeModal();
    renderApp();
  }
}
</script>
</body>
